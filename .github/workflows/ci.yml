name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          # pubspec.lock is gitignored, so hashFiles('pubspec.lock') is
          # always empty — hash pubspec.yaml so the cache invalidates
          # when deps change. No restore-keys fallback: a mismatched
          # .dart_tool from a prior pubspec.yaml can hide newly-added
          # packages from the analyzer even after `flutter pub get`.
          key: pub-${{ hashFiles('pubspec.yaml') }}

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Debug sqflite_common_ffi install
        run: |
          echo '--- sqflite_common_ffi entry in package_config.json ---'
          grep -A 2 sqflite_common_ffi .dart_tool/package_config.json || true
          echo '--- contents of pub cache dir ---'
          ls -la /home/runner/.pub-cache/hosted/pub.dev/sqflite_common_ffi-2.4.0+3/lib/ 2>&1 || echo 'pub cache dir missing'
          echo '--- analysis_options.yaml ---'
          cat analysis_options.yaml 2>&1 || echo 'no analysis_options.yaml'
          echo '--- dart --version ---'
          dart --version
          echo '--- which dart / flutter ---'
          which dart flutter

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --exclude-tags=screenshot
