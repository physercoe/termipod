# Kimi Code (TypeScript) steward template.
#
# Drives `kimi acp` from the TypeScript rewrite of Kimi Code CLI
# (MoonshotAI/kimi-code — single compiled binary, data root
# ~/.kimi-code) as a long-running stdio JSON-RPC daemon via the
# M1/ACP path (ACPDriver, driver_acp.go). This is a SEPARATE product
# line from the Python kimi-cli that steward.kimi.v1.yaml targets;
# both install a `kimi` binary, so pick the template matching the
# host's actual build (`kimi --version`: Python prints
# `kimi, version 1.x.y`, TS prints a bare `0.x.y`).
#
# ADR-054 is the authoritative design; docs/plans/kimi-code-ts-engine.md
# carries the on-host verification record (kimi-code 0.27.0). Key
# decisions:
#   - M1-only. The TS build ships an ACP daemon (`kimi acp`,
#     protocolVersion 1, loadSession: true) — same wire shape as the
#     Python line. M4 (tmux pane) is the sole fallback when ACP can't
#     negotiate. A headless `-p --output-format stream-json` mode
#     exists upstream but is unwired (its NDJSON schema needs its own
#     frame profile; plan §2).
#   - Authentication is out-of-band via `kimi login` (device-code
#     flow) run interactively on the host. Until login completes,
#     session/new fails and ACPDriver surfaces the AUTH_REQUIRED
#     remediation pointing at `kimi login`.
#   - MCP injection is file-based: the hub writes
#     <workdir>/.kimi-code/mcp.json per spawn and the engine
#     auto-discovers it (project level, precedence over the
#     operator's user-level ~/.kimi-code/mcp.json, which stays
#     untouched). The Python line's --mcp-config-file flag was
#     removed upstream — there is NO argv splice on this path.
#
# Built-in. Copied to team/templates/agents/ on first init; user
# edits win — subsequent inits never overwrite.
template: agents.steward.kimi-ts
version: 1
extends: null

# M1 (ACP daemon) is the only wired shape for kimi-code-ts today; M4
# keeps a transcript when ACP can't negotiate (binary mismatch —
# e.g. the host actually has the Python build — daemon crashed
# mid-handshake). No M2 fallback yet — see plan §2.
driving_mode: M1
fallback_modes: [M4]

backend:
  kind: kimi-code-ts
  # default_workdir intentionally omitted — auto-derives
  # ~/hub-work/<pid8>/<handle> from the spawn so per-project kimi
  # stewards stay isolated on shared hosts.
  # cmd is what host-runner executes via `bash -c "cd <workdir> &&
  # <cmd>"`. One top-level kimi flag precedes the `acp` subcommand:
  #
  # --yolo (-y) auto-approves all tool calls at the engine layer.
  # This INTENTIONALLY bypasses ACP's session/request_permission gate
  # — same consent posture as the kimi (Python) steward, at the
  # opposite end of the consent spectrum from gemini's steward (which
  # omits --yolo precisely so the ACP gate fires). Operators who want
  # per-call principal consent override this cmd in their team-local
  # steward.kimi-ts.v1.yaml overlay. See ADR-054 D2.
  #
  # The Python line's --thinking flag was removed upstream; thinking
  # is config-driven (~/.kimi-code/config.toml [thinking]) and
  # per-session via ACP config options, so there is nothing to pass
  # here.
  cmd: "kimi --yolo acp"

default_role: team.coordinator
display_label: "Steward (kimi-ts)"

# Same governance shape as the claude / codex / gemini / kimi
# stewards — the kimi-ts steward coordinates the same way once the
# daemon model is hidden by the driver.
default_capabilities:
  - blob.read
  - blob.write
  - delegate
  - decision.vote: significant
  - spawn.descendants: 20
  - templates.read
  - templates_propose
  - tasks_create
  - tasks.assign_others
  - projects_create

prompt: steward.kimi-ts.v1.md

skills:
  - id: plan
    name: plan
    description: "Decompose a project goal into plan steps"
    tags: [planning]
  - id: brief
    name: brief
    description: "Write a briefing document summarizing run outputs"
    tags: [writing]

default_channels:
  hub-meta: full
