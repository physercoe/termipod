# Built-in briefing agent template. Copied to team/templates/agents/ on first
# init. User edits win — subsequent init calls never overwrite.
#
# The briefing agent wakes on a cron schedule (or a manual plan step),
# reads completed runs + their trackio URIs under the calling project,
# and writes a concise document summarizing outcomes. It requests a
# review so the document shows up as a pending approval in the mobile
# Inbox. Runs on the VPS steward host — no GPU required.
template: agents.briefing
version: 1
extends: null

# ADR-025 W6 — workers default to M2 (structured stdio) so the
# steward overlay can render transcripts; M4 fallback for hosts
# without the MCP gateway port. Briefing keeps its explicit
# `default_workdir: ~/hub-work` since it's the team-shared scratch
# space, not project-scoped.
driving_mode: M2
fallback_modes: [M4]

backend:
  kind: claude-code
  model: sonnet-4-6
  default_workdir: ~/hub-work
  # M2 (structured stdio) speaks the agent-native JSON-line protocol. The
  # mode-selecting flags (--print --output-format stream-json
  # --input-format stream-json --verbose) live on the claude-code family's
  # launch.M2.mode_args (ADR-043) and the launcher appends them — a
  # persona can no longer omit them and ship a cmd that runs interactive.
  # This template carries only the bin + intent ({{model}}, permissions).
  cmd: "claude --model {{model}} {{permission_flag}}"

default_role: writer.briefing
display_label: "Briefing Agent"

default_capabilities:
  - blob.read
  - blob.write
  - documents_create
  - reviews.request
  - runs.read
  - spawn.descendants: 0
  - decision.vote: minor

prompt: briefing.v1.md

skills:
  - id: brief
    name: brief
    description: "Write a briefing document summarizing run outputs"
    tags: [writing]

default_channels:
  hub-meta: write
