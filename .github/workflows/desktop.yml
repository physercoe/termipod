name: Desktop

# WS2 of docs/plans/desktop-control-plane.md. The desktop control plane is a
# separate web-tech client (Tauri v2 + React + TS). This workflow is its gate:
# the frontend typechecks + builds (browser target), and the Tauri Rust core
# compiles (there is no local Rust toolchain, so CI is the Rust build gate).

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'design-tokens/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - 'design-tokens/**'
      - '.github/workflows/desktop.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - run: npm ci
      - name: Typecheck + build (also verifies shared tokens flow into the CSS)
        run: npm run build
      - name: Design-token ratchet (#318 — no new hex / --color-* leaks, no phantom tokens)
        run: bash ../scripts/lint-desktop-tokens.sh

  electron-shell:
    # ADR-055 M1: the Electron shell is a self-contained package under
    # desktop/electron/. Gate it (typecheck + esbuild bundle) without pulling the
    # ~100 MB Electron binary — typecheck/build need only the bundled types.
    name: Electron shell typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/electron
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/electron/package-lock.json
      - name: Install (skip Electron binary — typecheck/build only)
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      - run: npm run typecheck
      - run: npm run build
      - run: npm test # sync-core fixture suite (node:test, native TS)

  tauri:
    name: Tauri Rust compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build frontend (generate_context! embeds ../dist)
        working-directory: desktop
        run: npm ci && npm run build

      - name: Compile Tauri Rust core
        working-directory: desktop/src-tauri
        run: cargo build

      - name: Test Rust core (vault crypto round-trips)
        working-directory: desktop/src-tauri
        run: cargo test

  vault-wasm:
    # ADR-055 M2.6 (D-3): the vault crypto is COMPILED to WASM for the Electron
    # shell, not reimplemented in TS (byte-compat with the Dart client + the
    # Tauri build). This gate proves vault-core's crypto (native `cargo test`,
    # incl. the NIST AES-GCM KATs) AND that it builds to a nodejs-target WASM
    # whose round-trip works. No local Rust toolchain here — CI is the Rust gate.
    name: Vault WASM build + crypto tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: vault-core crypto tests (native)
        working-directory: desktop/vault-core
        run: cargo test
      - name: Build vault-wasm (nodejs target)
        working-directory: desktop/vault-wasm
        run: wasm-pack build --target nodejs --release
      - name: WASM round-trip smoke test (seal→open, device + recovery wrap→unwrap)
        working-directory: desktop/vault-wasm
        run: |
          node -e '
            const v = require("./pkg/vault_wasm.js");
            const k = v.vault_generate_key();
            if (v.vault_open(k, v.vault_seal(k, "hi")) !== "hi") throw new Error("seal/open");
            const dev = JSON.parse(v.vault_generate_device());
            const de = v.vault_wrap_for_device(k, dev.public_key);
            if (v.vault_unwrap_device(dev.seed, de) !== k) throw new Error("device wrap");
            const code = v.vault_generate_recovery_code();
            const re = v.vault_wrap_for_recovery(k, code);
            if (v.vault_unwrap_recovery(code, re) !== k) throw new Error("recovery wrap");
            console.log("vault WASM round-trips: ok");
          '
