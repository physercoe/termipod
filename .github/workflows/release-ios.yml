name: Build & Release iOS

# Mobile lane (iOS half). Adds the unsigned IPA to the `mobile-v<ver>` release
# that release.yml creates for the Android APK.
on:
  push:
    tags:
      - 'mobile-v*'

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.9'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          for i in 1 2 3; do
            if pod install --repo-update; then
              echo "CocoaPods install succeeded on attempt $i"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "CocoaPods install failed after 3 attempts"
              exit 1
            fi
            rm -rf Pods
            SLEEP_TIME=$((10 * i))
            echo "Attempt $i failed, retrying in ${SLEEP_TIME}s..."
            sleep $SLEEP_TIME
          done

      - name: Build iOS (unsigned)
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#mobile-v}"
          # CalVer YYYY.MMDD.HHMM → build number = minutes since 2020-01-01 UTC
          # (monotonic across the day boundary; must match release.yml's formula).
          # Pure integer Julian-Day arithmetic — the macOS runner's BSD `date`
          # rejects GNU's `-d` flag, so we never shell out to `date` here.
          IFS='.' read -r CVY CVMMDD CVHHMM <<< "${VERSION_NUM%%-*}"
          CVMM=$((10#$CVMMDD / 100)); CVDD=$((10#$CVMMDD % 100))
          CVHH=$((10#$CVHHMM / 100)); CVMI=$((10#$CVHHMM % 100))
          CVA=$(( (14 - CVMM) / 12 )); CVYY=$(( CVY + 4800 - CVA )); CVM=$(( CVMM + 12 * CVA - 3 ))
          CVJDN=$(( CVDD + (153 * CVM + 2) / 5 + 365 * CVYY + CVYY / 4 - CVYY / 100 + CVYY / 400 - 32045 ))
          BUILD_NUMBER=$(( (CVJDN - 2458850) * 1440 + CVHH * 60 + CVMI ))  # 2458850 = JDN(2020-01-01)
          GIT_REF="${{ github.ref_name }}@$(echo '${{ github.sha }}' | cut -c1-7)"

          flutter build ios --release --no-codesign \
            --build-name="$VERSION_NUM" \
            --build-number="$BUILD_NUMBER" \
            --dart-define=APP_VERSION="$VERSION" \
            --dart-define=GIT_REF="$GIT_REF"

      - name: Create unsigned IPA
        run: |
          set -euo pipefail
          VERSION_NUM="${GITHUB_REF_NAME#mobile-v}"
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r "Mobile-${VERSION_NUM}-ios-unsigned.ipa" Payload

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: Mobile-*-ios-unsigned.ipa
          fail_on_unmatched_files: false
          generate_release_notes: false
