# Built-in steward template. Copied to team/templates/agents/ on first init.
# User edits win — subsequent init calls never overwrite.
template: agents.steward
version: 1
extends: null

# Drive claude in M2 (structured stdio) so we can render its turns as a
# chat transcript and gate tool use through the permission_prompt MCP
# tool. M4 fallback is the runner's own (still useful for hosts that
# don't expose the MCP gateway port).
driving_mode: M2
fallback_modes: [M4]

backend:
  kind: claude-code
  # The hub binds {{model}} from this field and {{permission_flag}} from
  # the permission_modes map below. Editing either is enough — there is
  # no Go-side default to override. To add a new model, change `model`
  # and re-spawn. To add a new permission mode (e.g. "ask-once"),
  # extend permission_modes and pass that key as permission_mode in the
  # spawn request.
  model: claude-opus-4-7
  default_workdir: ~/hub-work
  permission_modes:
    # "skip" = PC-style auto-allow, used by the demo bootstrap sheet.
    skip: "--dangerously-skip-permissions"
    # "prompt" = route every tool call through the MCP gateway →
    # attention_items. Requires the permission_prompt MCP tool to be
    # registered (W2). The {{mcp_namespace}} placeholder resolves to
    # hub.MCPServerName so the flag stays in lockstep with the server
    # name host-runner writes into .mcp.json. Empty mode falls through
    # to claude's own default.
    prompt: "--permission-prompt-tool mcp__{{mcp_namespace}}__permission_prompt"
  # cmd is what host-runner actually launches. Flags:
  #   --print                          non-interactive (no TUI repl).
  #   --output-format stream-json      one JSON object per line on stdout.
  #   --input-format  stream-json      reads user turns as JSON frames on
  #                                    stdin so the process stays alive
  #                                    across turns. Without this flag,
  #                                    --print exits after a single reply.
  #   --verbose                        required by claude-code when
  #                                    combining --print with stream-json
  #                                    output; without it the CLI rejects
  #                                    the flag combination.
  cmd: "claude --model {{model}} --print --output-format stream-json --input-format stream-json --verbose {{permission_flag}}"

default_role: team.coordinator
display_label: "Steward"

default_capabilities:
  - blob.read
  - blob.write
  - delegate
  - decision.vote: significant
  - spawn.descendants: 20
  - templates.read
  - templates.propose
  - tasks.create
  - tasks.assign_others
  - projects.create

prompt: steward.v1.md

# Advertised A2A skills. Consumed by host-runner when serving the
# agent-card at /a2a/<id>/.well-known/agent.json. Keeping skills in the
# template (not hardcoded in the hub) means adding a new agent kind is a
# drop-in YAML, not a code change.
skills:
  - id: plan
    name: plan
    description: "Decompose a project goal into plan steps"
    tags: [planning]
  - id: brief
    name: brief
    description: "Write a briefing document summarizing run outputs"
    tags: [writing]

default_channels:
  hub-meta: full
