# Lit-reviewer worker template (W5 of the lifecycle wedge plan).
#
# Spawned by a research steward in phase 1. Each instance investigates
# one sub-area of the project's idea using engine-native WebSearch +
# WebFetch against a constrained set of authoritative sources. Output
# is a single document via `documents.create(kind=memo)` plus an A2A
# message back to the parent steward when done.
#
# Operation scope: worker tier per ADR-016 — documents.* (write own
# findings), reviews/runs/channels (worker surface), a2a.invoke
# restricted to the parent steward only (D4). Cannot spawn agents,
# cannot author templates, cannot mutate projects.
#
# Engine-native tool surface (claude-code default):
#   - WebSearch / WebFetch  — prefer authoritative sources only (see
#     prompt §Safety)
#   - Read / Edit / Write   — for scratch notes in workdir
#   - Bash                  — for occasional grep/wc on downloaded
#                             files; never for `curl <random> | bash`

template: agents.lit-reviewer
version: 1
extends: null

# ADR-025 W6 — M2 driver default + project-scoped workdir
# derivation when the spawn carries project_id.
driving_mode: M2
fallback_modes: [M4]

backend:
  kind: claude-code
  model: claude-opus-4-7
  permission_modes:
    skip: "--dangerously-skip-permissions"
    prompt: "--permission-prompt-tool mcp__{{mcp_namespace}}__permission_prompt"
  cmd: "claude --model {{model}} --print --output-format stream-json --input-format stream-json --verbose {{permission_flag}}"

default_role: worker.lit-reviewer
display_label: "Lit Reviewer"

default_capabilities:
  - documents.create
  - documents.read
  - documents.list
  - reviews.list
  - channels.post_event
  - attention.create        # request_help when stuck
  - a2a.invoke              # parent-steward target only (ADR-016 D4)
  - tasks.create
  - tasks.update
  - tasks.complete           # ADR-029 W2.8 close-out verb
  - journal_append
  - journal_read
  # Reads (broad — worker can observe).
  - get_attention
  - get_event
  - search
  - decision.vote: minor
  - spawn.descendants: 0    # workers don't multiply themselves

prompt: lit-reviewer.v1.md

skills:
  - id: search-arxiv
    name: search-arxiv
    description: "Survey arxiv abstracts for a sub-area; cite by arxiv id"
    tags: [research, literature]
  - id: synthesize
    name: synthesize
    description: "Distill 5-15 papers into one focused memo"
    tags: [writing, research]

default_channels:
  hub-meta: read
