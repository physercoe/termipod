[package]
name = "termipod-desktop"
version = "0.0.1"
description = "TermiPod desktop control plane"
authors = ["TermiPod"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "termipod_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# rustls-tls avoids a system OpenSSL dependency in CI.
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
