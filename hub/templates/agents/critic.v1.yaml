# Critic worker template (W5 of the lifecycle wedge plan).
#
# Used in two contexts: code review during phase 2 (target = the
# coder's method-spec + worktree commit) and paper review during
# phase 4 (target = the paper-writer's draft document). Both
# follow the same shape — read the target, score it on 3-5 axes,
# write a review document, return to parent steward via A2A.
#
# Operation scope: worker tier per ADR-016. Read-side broad,
# write narrow (reviews + documents.create only). No code
# execution; the critic doesn't run tests, it reviews artifacts.

template: agents.critic
version: 1
extends: null

# ADR-025 W6 — M2 driver default + project-scoped workdir
# derivation when the spawn carries project_id.
driving_mode: M2
fallback_modes: [M4]

backend:
  kind: claude-code
  model: claude-opus-4-7
  permission_modes:
    skip: "--dangerously-skip-permissions"
    prompt: "--permission-prompt-tool mcp__{{mcp_namespace}}__permission_prompt"
  cmd: "claude --model {{model}} --print --output-format stream-json --input-format stream-json --verbose {{permission_flag}}"

default_role: worker.critic
display_label: "Critic"

default_capabilities:
  - documents.create        # the review document
  - documents.read          # the target document
  - documents.list
  - reviews.create          # if reviewing a document, optional
  - reviews.list
  - runs.list               # paper-review may want to verify numbers
  - run.metrics.read
  - channels.post_event
  - attention.create        # request_help when blocked
  - a2a.invoke              # parent-steward target only (D4)
  - tasks.create
  - tasks.update
  - journal_append
  - journal_read
  - get_attention
  - get_event
  - search
  - decision.vote: minor
  - spawn.descendants: 0

prompt: critic.v1.md

skills:
  - id: code-review
    name: code-review
    description: "Review a method-spec + code commit for correctness, scope, reproducibility"
    tags: [review, code]
  - id: paper-review
    name: paper-review
    description: "Review a draft paper for clarity, rigor, faithful citation, integrity"
    tags: [review, writing]

default_channels:
  hub-meta: read
