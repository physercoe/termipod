name: reproduce-paper
kind: goal
goal: |-
  Reproduce the headline result of {paper_arxiv_id} from {repo_url}. Compare reported {target_metric} to measured value; flag if gap exceeds tolerance_pct.
parameters:
  paper_arxiv_id: ""
  repo_url: ""
  target_metric: ""
  tolerance_pct: 5.0
on_create_template_id: agents.steward
# Overview hero: the reproduction effort hinges on what has been
# produced so far (figures, logs, PR links). A+B chassis, IA §6.2.
overview_widget: recent_artifacts
