name: Build & Release Android

# Mobile lane (split per component 2026-07-24). This builds ONLY the Android
# APK and attaches it to the `mobile-v<ver>` release (release-ios.yml adds the
# IPA to the same release). Hub/host server binaries moved to their own lanes
# (release-server.yml, `hub-v*` / `host-v*`). The mobile release stays
# NON-prerelease so it owns GitHub's `releases/latest`, which the in-app
# updater reads (hub/host/desktop lanes are prereleases).
on:
  push:
    tags:
      - 'mobile-v*'

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.9'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks

      - name: Build arm64-v8a APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          # Strip the lane prefix: tag `mobile-v2026.724.301-alpha` → build-name
          # `2026.724.301-alpha`.
          VERSION_NUM="${VERSION#mobile-v}"
          # CalVer YYYY.MMDD.HHMM (UTC build time). versionCode = minutes since
          # 2020-01-01 UTC — a monotonic int32 that survives the day boundary
          # (the old MAJOR*10000+MINOR*100+PATCH would REGRESS at midnight, since
          # HHMM runs 0..2359 > the 100-wide PATCH slot). Computed with a pure
          # integer Julian-Day formula, NOT `date -u -d` — that flag is GNU-only
          # and fails on the macOS iOS runner (`date: illegal option -- d`); the
          # Android + iOS builds MUST agree, so both use this arithmetic. `10#`
          # forces base-10 so "08"/"09" is never read as octal. Android caps
          # versionCode at ~2.1e9; minutes-since-2020 stays ~3.4M for decades.
          IFS='.' read -r CVY CVMMDD CVHHMM <<< "${VERSION_NUM%%-*}"
          CVMM=$((10#$CVMMDD / 100)); CVDD=$((10#$CVMMDD % 100))
          CVHH=$((10#$CVHHMM / 100)); CVMI=$((10#$CVHHMM % 100))
          CVA=$(( (14 - CVMM) / 12 )); CVYY=$(( CVY + 4800 - CVA )); CVM=$(( CVMM + 12 * CVA - 3 ))
          CVJDN=$(( CVDD + (153 * CVM + 2) / 5 + 365 * CVYY + CVYY / 4 - CVYY / 100 + CVYY / 400 - 32045 ))
          BUILD_NUMBER=$(( (CVJDN - 2458850) * 1440 + CVHH * 60 + CVMI ))  # 2458850 = JDN(2020-01-01)
          if [ "$BUILD_NUMBER" -le 0 ] || [ "$BUILD_NUMBER" -ge 2100000000 ]; then
            echo "::error::computed versionCode $BUILD_NUMBER out of range for $VERSION_NUM"; exit 1
          fi
          GIT_REF="${{ github.ref_name }}@$(echo '${{ github.sha }}' | cut -c1-7)"
          # Only ship arm64-v8a — covers every modern Android device.
          # 32-bit armeabi-v7a and x86_64 emulator builds were dropped
          # 2026-05-07: install share was negligible vs. release-asset
          # bloat and the post-Play-Store 64-bit-only policy.
          #
          # --split-per-abi is REQUIRED even with a single target. The
          # Flutter Gradle plugin adds an ABI offset to versionCode
          # only when split-per-abi is on (arm64-v8a → +4000). v1.0.381
          # dropped the flag, which dropped the on-device versionCode
          # from 14378 back to 10381 — Android refused the install with
          # "higher version already installed." Keep the flag so the
          # offset stays consistent with every prior release.
          #
          # --obfuscate + --split-debug-info strips Dart symbols for a
          # few more MB; the mapping lives under build/symbols/.
          #
          # Retry loop: Gradle plugin-marker resolution
          # (org.gradle.kotlin.kotlin-dsl, the Flutter Android Gradle
          # plugin) is one network hop away from us and has flaked at
          # least once in production (v1.0.370-alpha, 2026-05-06). The
          # failure mode is "Plugin … was not found in any of the
          # following sources" which is fatal but transient. Retry up
          # to 3 times with backoff before failing the build for real.
          for attempt in 1 2 3; do
            if flutter build apk --release --split-per-abi \
                --target-platform=android-arm64 \
                --obfuscate --split-debug-info=build/symbols \
                --build-name="$VERSION_NUM" \
                --build-number="$BUILD_NUMBER" \
                --dart-define=APP_VERSION="$VERSION" \
                --dart-define=GIT_REF="$GIT_REF"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::APK build failed after 3 attempts"
              exit 1
            fi
            echo "::warning::APK build attempt $attempt failed; retrying after backoff"
            sleep $((attempt * 30))
          done

      - name: Rename APK
        # Drop the `termipod-` prefix; name it for the lane. Uses the bare
        # version (not the full tag) so the file reads `Mobile-<ver>-...`.
        run: |
          set -euo pipefail
          VERSION_NUM="${GITHUB_REF_NAME#mobile-v}"
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             "build/app/outputs/flutter-apk/Mobile-${VERSION_NUM}-android-arm64.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Mobile release is NON-prerelease by design — it owns `releases/latest`,
          # which the in-app updater reads. (hub/host/desktop lanes are prereleases.)
          files: |
            build/app/outputs/flutter-apk/Mobile-*-android-arm64.apk
          name: Mobile ${{ github.ref_name }}
          body: |
            **Mobile (Android):**
            - `Mobile-<ver>-android-arm64.apk` — every modern Android phone/tablet (Android 8+). 32-bit and x86_64 builds are no longer published.

            The iOS `.ipa` is added to this same release by the iOS workflow.
            Hub and host-runner server binaries ship in their own releases
            (`hub-v*` / `host-v*`).
          generate_release_notes: true
