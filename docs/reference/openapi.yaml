openapi: 3.1.0
info:
  title: termipod hub HTTP API
  description: |
    Authoritative OpenAPI specification for the termipod hub HTTP
    surface. Every `/v1/...` endpoint is listed by tag (resource
    group) with request / response shapes and the auth scheme.

    **Version model.** This spec covers `v1`. Additive changes
    (new endpoints, new optional fields) ship under `v1`; breaking
    changes would bump to `/v2/`. The hub reports its build at
    `GET /v1/_info` and the mobile client checks
    `supported_api_versions` at startup.

    **Cross-references.**
    - [`api-overview.md`](api-overview.md) — endpoint index +
      cross-cutting conventions (this spec is the machine-readable
      form).
    - [`database-schema.md`](database-schema.md) — physical schema
      that backs the response shapes.
    - [`audit-events.md`](audit-events.md) — the canonical taxonomy
      of `audit_events` rows referenced from response payloads.

    Status: draft. Hand-written; first issuance 2026-05-05 from
    `hub/internal/server/server.go` route table at v1.0.351.
  version: "1.0.351-alpha"
  license:
    name: Apache-2.0
    url: https://github.com/physercoe/termipod/blob/main/LICENSE
  contact:
    name: termipod issue tracker
    url: https://github.com/physercoe/termipod/issues

servers:
  - url: "https://hub.example.com"
    description: Production hub (replace with operator's hub URL)
  - url: "http://127.0.0.1:8443"
    description: Local development (cleartext on loopback only)

security:
  - bearerAuth: []

tags:
  - name: Meta
    description: Server info, search, MCP entry point
  - name: Hosts
    description: Host registration, heartbeat, A2A directory
  - name: Agents
    description: Agent CRUD + spawn + lifecycle + AG-UI events
  - name: Sessions
    description: Per-agent conversational sessions
  - name: Projects
    description: Projects + lifecycle (phases, deliverables, criteria)
  - name: Plans
    description: Plans, plan steps, schedules
  - name: Runs
    description: Experiments + metrics
  - name: Documents
    description: Documents, reviews, artifacts, blobs
  - name: Channels
    description: Channels + events
  - name: Tasks
    description: Project tasks
  - name: Attention
    description: Attention queue + resolution
  - name: Admin
    description: Audit, policy, tokens, principals
  - name: Templates
    description: Project + agent + step templates
  - name: MCP
    description: Single MCP service entry point

paths:

  # ======================================================================
  # Meta + system
  # ======================================================================

  /v1/_info:
    get:
      tags: [Meta]
      operationId: getInfo
      summary: Server build metadata
      security: []
      responses:
        "200":
          description: Server info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerInfo"
              example:
                server_version: "1.0.351-alpha"
                supported_api_versions: ["v1"]
                schema_versions_supported: [1]
                commit: "0426abe..."
                build_time: "2026-04-25T15:00:00Z"
                modified: false

  /v1/search:
    get:
      tags: [Meta]
      operationId: search
      summary: Full-text search across events + agent_events
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Search hits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  # ======================================================================
  # Hosts + A2A
  # ======================================================================

  /v1/teams/{team}/hosts:
    parameters:
      - $ref: "#/components/parameters/Team"
    post:
      tags: [Hosts]
      operationId: registerHost
      summary: Register a host (host-runner first boot)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostRegisterRequest"
      responses:
        "201":
          description: Host registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Host"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [Hosts]
      operationId: listHosts
      summary: List hosts in team
      parameters:
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Hosts page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostsPage"

  /v1/teams/{team}/hosts/{host}:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Host"
    get:
      tags: [Hosts]
      operationId: getHost
      summary: Get one host
      responses:
        "200":
          description: Host
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Host" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Hosts]
      operationId: deleteHost
      summary: Delete a host (admin)
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/teams/{team}/hosts/{host}/heartbeat:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Host"
    post:
      tags: [Hosts]
      operationId: hostHeartbeat
      summary: Heartbeat with build metadata + capabilities
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HostHeartbeat" }
      responses:
        "200":
          description: Heartbeat acknowledged
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Host" }

  /v1/teams/{team}/hosts/{host}/commands:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Host"
    get:
      tags: [Hosts]
      operationId: listHostCommands
      summary: Pull queued out-of-band commands
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, done, failed] }
      responses:
        "200":
          description: Commands page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HostCommandsPage" }

  /v1/teams/{team}/hosts/{host}/ssh_hint:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Host"
    patch:
      tags: [Hosts]
      operationId: updateHostSSHHint
      summary: Update non-secret SSH hint (no credentials)
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SSHHint" }
      responses:
        "200": { description: Updated }

  /v1/teams/{team}/hosts/{host}/capabilities:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Host"
    put:
      tags: [Hosts]
      operationId: updateHostCapabilities
      summary: Replace binary-presence map
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HostCapabilities" }
      responses:
        "200": { description: Updated }

  /v1/teams/{team}/hosts/{host}/a2a/cards:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Host"
    put:
      tags: [Hosts]
      operationId: putHostA2ACards
      summary: Publish per-host A2A agent cards
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items: { $ref: "#/components/schemas/A2ACard" }
      responses:
        "200": { description: Published }

  /v1/teams/{team}/hosts/{host}/a2a/tunnel/next:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Host"
    get:
      tags: [Hosts]
      operationId: tunnelNext
      summary: Long-poll next A2A tunnel request
      responses:
        "200":
          description: Tunnel request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TunnelRequest" }

  /v1/teams/{team}/hosts/{host}/a2a/tunnel/responses:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Host"
    post:
      tags: [Hosts]
      operationId: tunnelResponse
      summary: Post A2A tunnel response back to relay
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TunnelResponse" }
      responses:
        "204": { description: Accepted }

  /v1/teams/{team}/a2a/cards:
    parameters:
      - $ref: "#/components/parameters/Team"
    get:
      tags: [Hosts]
      operationId: listTeamA2ACards
      summary: Team-wide A2A agent-card directory
      responses:
        "200":
          description: Cards
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/A2ACard" }

  /v1/teams/{team}/commands/{cmd}:
    parameters:
      - $ref: "#/components/parameters/Team"
      - in: path
        name: cmd
        required: true
        schema: { type: string }
    patch:
      tags: [Hosts]
      operationId: patchHostCommand
      summary: Update host-command status
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [done, failed] }
                error: { type: string }
      responses:
        "200": { description: Updated }

  # ======================================================================
  # Agents
  # ======================================================================

  /v1/teams/{team}/steward.general/ensure:
    parameters:
      - $ref: "#/components/parameters/Team"
    post:
      tags: [Agents]
      operationId: ensureGeneralSteward
      summary: Idempotently ensure the team's general steward exists
      responses:
        "200":
          description: Steward (existing or new)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }

  /v1/teams/{team}/agents:
    parameters:
      - $ref: "#/components/parameters/Team"
    post:
      tags: [Agents]
      operationId: createAgent
      summary: Create an agent row (without spawning)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
    get:
      tags: [Agents]
      operationId: listAgents
      summary: List agents
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Agents page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentsPage" }

  /v1/teams/{team}/agents/spawn:
    parameters:
      - $ref: "#/components/parameters/Team"
    post:
      tags: [Agents]
      operationId: spawnAgent
      summary: Spawn an agent from a spec YAML
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentSpawnRequest" }
      responses:
        "201":
          description: Spawn accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentSpawn" }
        "202":
          description: Spawn pending policy approval
          content:
            application/json:
              schema:
                type: object
                properties:
                  attention_id: { type: string }
                  status: { type: string, enum: [pending_approval] }

  /v1/teams/{team}/agents/spawns:
    parameters:
      - $ref: "#/components/parameters/Team"
    get:
      tags: [Agents]
      operationId: listSpawns
      summary: List spawn requests (host-runner uses this to poll)
      parameters:
        - in: query
          name: host_id
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
      responses:
        "200":
          description: Spawns
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgentSpawn" }

  /v1/teams/{team}/agents/{agent}:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    get:
      tags: [Agents]
      operationId: getAgent
      summary: Get agent
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
    patch:
      tags: [Agents]
      operationId: patchAgent
      summary: Update agent (status, pane_id, etc.)
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentPatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }
    delete:
      tags: [Agents]
      operationId: archiveAgent
      summary: Archive (preserves journal + audit; not a hard delete)
      responses:
        "204": { description: Archived }

  /v1/teams/{team}/agents/{agent}/journal:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    get:
      tags: [Agents]
      operationId: readAgentJournal
      summary: Read the agent's journal (markdown, append-only)
      responses:
        "200":
          description: Journal text
          content:
            text/markdown: {}
    post:
      tags: [Agents]
      operationId: appendAgentJournal
      summary: Append to journal
      requestBody:
        content:
          text/markdown: {}
      responses:
        "201": { description: Appended }

  /v1/teams/{team}/agents/{agent}/pause:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    post:
      tags: [Agents]
      operationId: pauseAgent
      summary: Pause loop (state pause_state='paused')
      responses:
        "200":
          description: Paused
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }

  /v1/teams/{team}/agents/{agent}/resume:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    post:
      tags: [Agents]
      operationId: resumeAgent
      summary: Resume loop
      responses:
        "200":
          description: Resumed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Agent" }

  /v1/teams/{team}/agents/{agent}/pane:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    get:
      tags: [Agents]
      operationId: getAgentPane
      summary: Snapshot pane buffer
      responses:
        "200":
          description: Pane snapshot
          content:
            text/plain: {}

  /v1/teams/{team}/agents/{agent}/events:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    post:
      tags: [Agents]
      operationId: postAgentEvent
      summary: Append AG-UI event (host-runner side)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentEvent" }
      responses:
        "201":
          description: Event recorded
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentEvent" }
    get:
      tags: [Agents]
      operationId: listAgentEvents
      summary: List agent events (paged)
      parameters:
        - in: query
          name: before
          schema: { type: integer }
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgentEvent" }

  /v1/teams/{team}/agents/{agent}/stream:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    get:
      tags: [Agents]
      operationId: streamAgentEvents
      summary: SSE — live AG-UI event stream
      parameters:
        - in: header
          name: Last-Event-ID
          schema: { type: string }
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /v1/teams/{team}/agents/{agent}/input:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    post:
      tags: [Agents]
      operationId: postAgentInput
      summary: Structured input (approve / reject / redirect / cancel / message)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentInput" }
      responses:
        "200": { description: Accepted }

  /v1/teams/{team}/agent-families:
    parameters:
      - $ref: "#/components/parameters/Team"
    get:
      tags: [Agents]
      operationId: listAgentFamilies
      summary: List agent-family templates
      responses:
        "200":
          description: Families
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgentFamily" }

  /v1/teams/{team}/agent-families/{family}:
    parameters:
      - $ref: "#/components/parameters/Team"
      - in: path
        name: family
        required: true
        schema: { type: string }
    get:
      tags: [Agents]
      operationId: getAgentFamily
      summary: Get one agent family
      responses:
        "200":
          description: Family
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentFamily" }
    put:
      tags: [Agents]
      operationId: putAgentFamily
      summary: Create or replace agent family
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentFamily" }
      responses:
        "200": { description: Saved }
    delete:
      tags: [Agents]
      operationId: deleteAgentFamily
      summary: Delete agent family
      responses:
        "204": { description: Deleted }

  # ======================================================================
  # Sessions
  # ======================================================================

  /v1/teams/{team}/agents/{agent}/sessions:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    post:
      tags: [Sessions]
      operationId: openSession
      summary: Open a session
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SessionOpenRequest" }
      responses:
        "201":
          description: Session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
    get:
      tags: [Sessions]
      operationId: listSessions
      summary: List sessions for agent
      parameters:
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Sessions page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SessionsPage" }

  /v1/teams/{team}/agents/{agent}/sessions/search:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
    get:
      tags: [Sessions]
      operationId: sessionSearch
      summary: FTS5 over session events
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
      responses:
        "200":
          description: Hits
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResults" }

  /v1/teams/{team}/agents/{agent}/sessions/{session}:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
      - $ref: "#/components/parameters/Session"
    get:
      tags: [Sessions]
      operationId: getSession
      summary: Get session
      responses:
        "200":
          description: Session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
    patch:
      tags: [Sessions]
      operationId: patchSession
      summary: Patch session (rename, update metadata)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }
    delete:
      tags: [Sessions]
      operationId: deleteSession
      summary: Hard-delete session
      responses:
        "204": { description: Deleted }

  /v1/teams/{team}/agents/{agent}/sessions/{session}/archive:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
      - $ref: "#/components/parameters/Session"
    post:
      tags: [Sessions]
      operationId: archiveSession
      summary: Archive session (retains transcript)
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SessionDistillRequest" }
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /v1/teams/{team}/agents/{agent}/sessions/{session}/close:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
      - $ref: "#/components/parameters/Session"
    post:
      tags: [Sessions]
      operationId: closeSession
      summary: Alias for archive
      responses:
        "200":
          description: Closed

  /v1/teams/{team}/agents/{agent}/sessions/{session}/fork:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
      - $ref: "#/components/parameters/Session"
    post:
      tags: [Sessions]
      operationId: forkSession
      summary: Fork from a cursor
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                from_event_id: { type: string }
      responses:
        "201":
          description: New session
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  /v1/teams/{team}/agents/{agent}/sessions/{session}/resume:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Agent"
      - $ref: "#/components/parameters/Session"
    post:
      tags: [Sessions]
      operationId: resumeSession
      summary: Resume with engine-specific cursor (e.g. claude --resume)
      responses:
        "200":
          description: Resumed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Session" }

  # ======================================================================
  # Templates
  # ======================================================================

  /v1/teams/{team}/templates:
    parameters:
      - $ref: "#/components/parameters/Team"
    get:
      tags: [Templates]
      operationId: listTemplates
      summary: List bundled + user templates
      responses:
        "200":
          description: Templates page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TemplatesPage" }

  /v1/teams/{team}/templates/{category}/{name}:
    parameters:
      - $ref: "#/components/parameters/Team"
      - in: path
        name: category
        required: true
        schema: { type: string }
      - in: path
        name: name
        required: true
        schema: { type: string }
    get:
      tags: [Templates]
      operationId: getTemplate
      summary: Get template body (YAML)
      responses:
        "200":
          description: Template
          content:
            application/yaml: {}
    put:
      tags: [Templates]
      operationId: putTemplate
      summary: Replace template body
      requestBody:
        required: true
        content:
          application/yaml: {}
      responses:
        "200": { description: Saved }
    delete:
      tags: [Templates]
      operationId: deleteTemplate
      summary: Delete template
      responses:
        "204": { description: Deleted }
    patch:
      tags: [Templates]
      operationId: renameTemplate
      summary: Rename template
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [new_name]
              properties:
                new_name: { type: string }
      responses:
        "200": { description: Renamed }

  # ======================================================================
  # Projects
  # ======================================================================

  /v1/teams/{team}/projects:
    parameters:
      - $ref: "#/components/parameters/Team"
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create project
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
