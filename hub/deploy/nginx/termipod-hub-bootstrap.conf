# Termipod Hub — nginx BOOTSTRAP config (port 80 only).
#
# Install this first so certbot can complete the HTTP-01 challenge. Once
# certbot writes /etc/letsencrypt/live/<host>/, swap this file for the
# full termipod-hub.conf (which adds the 443 server block) and reload.
#
# Replace hub.example.com with your real hostname before `nginx -t`.

server {
    listen 80;
    listen [::]:80;
    server_name hub.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Temporary: respond 200 on / so you can sanity-check DNS before cert
    # issuance. After certbot runs, the full config will 301 -> https.
    location / {
        return 200 "termipod-hub bootstrap — awaiting TLS\n";
        add_header Content-Type text/plain;
    }
}
