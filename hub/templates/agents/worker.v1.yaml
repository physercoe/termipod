# General-purpose worker template. Copied to team/templates/agents/ on first
# init; user edits win — subsequent init calls never overwrite.
#
# This is the domain-agnostic worker: a steward spawns it for any IC task that
# doesn't fit a specialized template (coder / ml-worker / lit-reviewer / …).
# It executes the steward's task description, reports back via A2A, and closes
# the loop — it does not govern, advance plans, or spawn descendants. The
# specialized workers are this template plus a focused prompt + capability set.
# See hub/templates/prompts/worker.v1.md for the runbook.
template: agents.worker
version: 1
extends: null

# ADR-025 W6 — workers run in M2 (structured stdio) so the steward overlay can
# render their turns as transcripts and gate tool use; M4 fallback covers hosts
# without the MCP gateway port. workdir is left to launch_m2: when project_id is
# set the hub derives ~/hub-work/<pid[:8]>/<handle> so each worker pane lands in
# a project-scoped folder without colliding with siblings.
driving_mode: M2
fallback_modes: [M4]

backend:
  kind: claude-code
  # {{model}} expands from this field; permission_modes lets the spawn request
  # pick a permission flag without forking the YAML.
  model: claude-sonnet-4-6
  permission_modes:
    skip: "--dangerously-skip-permissions"
    prompt: "--permission-prompt-tool mcp__{{mcp_namespace}}__permission_prompt"
  # M2 (structured stdio) needs the agent-native JSON-line flags — the
  # StdioDriver parses --output-format stream-json and feeds --input-format
  # stream-json. Identical to every other M2 claude-code template; dropping any
  # of these makes claude run interactive and the spawn fails.
  cmd: "claude --model {{model}} --print --output-format stream-json --input-format stream-json --verbose {{permission_flag}}"

default_role: worker.generic
display_label: "Worker"

# A broad IC set: read/write blobs + documents, manage its own task, journal,
# search, and message its parent steward. NO project/template/policy writes and
# no spawning — workers execute, not govern (ADR-016).
default_capabilities:
  - blob.read
  - blob.write
  - documents_create
  - documents_get
  - documents_list
  - tasks_create
  - tasks_update          # ADR-029: status='blocked' when work can't proceed
  - tasks_complete        # ADR-029 W2.8 close-out verb
  - journal_append
  - journal_read
  - channels_post_event
  - request_help          # escalate a decision to the director
  - a2a_invoke            # parent-steward target only (D4)
  - get_attention
  - get_event
  - search
  - decision.vote: minor
  - spawn.descendants: 0  # workers don't multiply

prompt: worker.v1.md

default_channels:
  hub-meta: read
