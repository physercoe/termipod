# Gemini steward template.
#
# Drives `gemini --acp` as a long-running stdio JSON-RPC daemon via
# the M1/ACP path (ACPDriver, driver_acp.go). Gemini's --acp flag
# starts an Agent Client Protocol server (Zed's spec, JSON-RPC over
# stdio): handshake = initialize + session/new; turn = session/prompt;
# events = session/update notifications; per-tool-call approval =
# session/request_permission round-trips.
#
# History: ADR-013 originally specified exec-per-turn-with-resume
# (`gemini -p <text> --output-format stream-json --resume <UUID>`) on
# the assumption gemini had no daemon mode. Verification against
# gemini-cli@0.41.2 (2026-05-07) showed --acp is stable and exposes
# session/request_permission, closing the ADR-013 D4 vendor gap.
# The exec-per-turn driver remains as the M2 fallback for hosts whose
# gemini build doesn't speak ACP (older versions; the M1 handshake
# fails clean and the resolver moves to M2).
#
# Built-in. Copied to team/templates/agents/ on first init; user
# edits win — subsequent inits never overwrite.
template: agents.steward.gemini
version: 1
extends: null

# M1 (ACP daemon) is the preferred shape — persistent process, real
# tail pane, per-tool-call approval. M2 (exec-per-turn-with-resume)
# is the legacy fallback; M4 keeps a transcript when neither stdio
# protocol is reachable.
driving_mode: M1
fallback_modes: [M2, M4]

backend:
  kind: gemini-cli
  # default_workdir intentionally omitted — auto-derives
  # ~/hub-work/<pid8>/<handle> from the spawn so per-project gemini
  # stewards stay isolated on shared hosts.
  # cmd is what host-runner executes via `bash -c "cd <workdir> &&
  # <cmd>"`. The --acp flag puts gemini into Agent Client Protocol
  # mode (Zed spec, JSON-RPC over stdio); ACPDriver speaks the rest.
  # No --yolo here: per-tool-call approval is now in-stream via
  # session/request_permission, so flag-time bypass is no longer
  # required. Operators who want flag-time auto-approval can override
  # via the team-local steward.gemini.v1.yaml overlay.
  cmd: "gemini --acp"
  # No permission_modes map: ACP's session/request_permission is
  # always-on at the protocol level, so we don't need a per-template
  # flag toggle the way claude-code's --permission-prompt-tool needs.
  # ACPDriver translates each request_permission RPC into an
  # approval_request agent_event and parks the JSON-RPC id until the
  # principal answers via input.approval. Risky decisions stewards
  # raise themselves still go through the existing
  # `request_approval` MCP tool (turn-based, vendor-neutral).

default_role: team.coordinator
display_label: "Steward (gemini)"

# Same governance shape as the claude + codex stewards — gemini
# stewards coordinate the same way once the per-turn process model
# is hidden by the driver.
default_capabilities:
  - blob.read
  - blob.write
  - delegate
  - decision.vote: significant
  - spawn.descendants: 20
  - templates.read
  - templates.propose
  - tasks.create
  - tasks.assign_others
  - projects.create

prompt: steward.gemini.v1.md

skills:
  - id: plan
    name: plan
    description: "Decompose a project goal into plan steps"
    tags: [planning]
  - id: brief
    name: brief
    description: "Write a briefing document summarizing run outputs"
    tags: [writing]

default_channels:
  hub-meta: full
