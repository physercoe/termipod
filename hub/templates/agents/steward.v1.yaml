# Built-in steward template. Copied to team/templates/agents/ on first init.
# User edits win — subsequent init calls never overwrite.
template: agents.steward
version: 1
extends: null

backend:
  kind: claude-code
  model: opus-4-7
  default_workdir: ~/hub-work
  # cmd is what host-runner actually launches in the pane. Without it the
  # TmuxLauncher falls back to a placeholder shell that prints
  # "pane ready; no backend configured".
  cmd: "claude --model opus-4-7"

default_role: team.coordinator
display_label: "Steward"

default_capabilities:
  - blob.read
  - blob.write
  - delegate
  - decision.vote: significant
  - spawn.descendants: 20
  - templates.read
  - templates.propose
  - tasks.create
  - tasks.assign_others
  - projects.create

prompt: steward.v1.md

# Advertised A2A skills. Consumed by host-runner when serving the
# agent-card at /a2a/<id>/.well-known/agent.json. Keeping skills in the
# template (not hardcoded in the hub) means adding a new agent kind is a
# drop-in YAML, not a code change.
skills:
  - id: plan
    name: plan
    description: "Decompose a project goal into plan steps"
    tags: [planning]
  - id: brief
    name: brief
    description: "Write a briefing document summarizing run outputs"
    tags: [writing]

default_channels:
  hub-meta: full
