<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TermiPod — Nested">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e0d0"/>
      <stop offset="100%" stop-color="#0090ff"/>
    </linearGradient>
    <radialGradient id="starHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e0d0" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#00e0d0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e0d0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#0D0E18"/>

  <!-- Outer pod (principal) -->
  <rect x="88" y="88" width="336" height="336" rx="96"
        fill="none" stroke="url(#accent)" stroke-width="5" stroke-opacity="0.3"/>

  <!-- Middle pod (steward) -->
  <rect x="152" y="152" width="208" height="208" rx="60"
        fill="none" stroke="url(#accent)" stroke-width="5" stroke-opacity="0.6"/>

  <!-- Spark at the core (agent execution) -->
  <g transform="translate(256 256)">
    <circle r="54" fill="url(#starHalo)"/>
    <path
      d="M 0,-42 Q 5.5,-5.5 42,0 Q 5.5,5.5 0,42 Q -5.5,5.5 -42,0 Q -5.5,-5.5 0,-42 Z"
      fill="url(#accent)"/>
  </g>
</svg>
