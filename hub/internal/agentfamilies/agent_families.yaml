# yaml-language-server: $schema=./agent_families.schema.json
#
# Single source of truth for which agent CLIs the hub knows about.
# Adding a new family is a YAML edit, never a Go change.
#
# Each entry carries:
#   - family       — wire-level name used in hosts.capabilities_json,
#                    template backend.kind, and audit rows.
#   - bin          — the executable host-runner probes via exec.LookPath.
#   - version_flag — argument the probe runs to read a version string.
#                    Empty means "skip the version probe".
#   - supports     — modes the family is known to support; consumed by
#                    modes.Resolve to reject incompatible spawn requests.
#                    Mode tokens: M1|M2|M4 (see blueprint §5.3.1).
#   - incompatibilities — list of {mode, billing, reason} records read
#                    by modes.Resolve to fail-fast spawns whose mode +
#                    declared billing combination is broken at the
#                    upstream level (e.g. Anthropic SDK limitations).
#   - frame_profile — declarative stream-json translator (ADR-010,
#                    optional). When absent, the host-runner falls
#                    back to the hardcoded driver_stdio.go translator.
#                    See docs/reference/frame-profiles.md to author.
#
# Why a YAML file instead of Go literals: the blueprint (§5.3.2) wants
# new agent families to land as drop-in declarations, and the hub
# itself should not encode third-party billing quirks in source. If a
# vendor ships M1 support tomorrow we add a row here and rebuild — no
# resolver edits, no probe edits.
families:
  - family: claude-code
    bin: claude
    version_flag: --version
    supports: [M1, M2, M4]
    # ADR-021 D4 / W2.1 — claude has no protocol-level set_mode RPC on
    # M2 stream-json; --model and --permission-mode are flag-time only.
    # Mode/model picker selections route through respawn-with-mutated-spec
    # (W2.3); engine_session_id resume keeps the transcript continuous.
    # M1 (claude-code SDK ACP) ships post-MVP — when it lands the SDK's
    # session/set_mode advertisement flips this row to "rpc".
    runtime_mode_switch:
      M1: respawn
      M2: respawn
    # ADR-021 D5 / W4.6 — image content block input support per mode.
    # claude's stream-json (M2) accepts a content array with image
    # blocks; the driver wire shape lands in W4.2. M1 (claude-code SDK
    # ACP) ships post-MVP — when it lands the SDK accepts image blocks
    # too. M4 (tmux pane) has no inline-image affordance.
    prompt_image:
      M1: true
      M2: true
      M4: false
    incompatibilities:
      - mode: M1
        billing: subscription
        reason: "M1 requires api_key billing for claude-code (Agent SDK limitation)"
    # ─── Frame profile (ADR-010) ──────────────────────────────────
    # Declarative translation of claude-code's stream-json output
    # into typed agent_events. Mirrors driver_stdio.go::translate()
    # behavior; the parity test in
    # hub/internal/hostrunner/profile_translate_parity_test.go runs
    # both translators against a recorded corpus and fails on diff.
    #
    # Authoring & extension: see docs/reference/frame-profiles.md.
    # Each rule's inline comment notes which SDK release the rule
    # was authored for, so AI maintainers extending later have the
    # "git log of the upstream" as context.
    frame_profile:
      description: |
        claude-code stream-json → typed agent_events.
        Most-specific match wins (largest match-keyset); ties fire in
        declaration order. Inside for_each, $.foo is the element and
        $$.foo is the parent frame. a || b returns the first non-nil
        term; trailing literal acts as default.
      profile_version: 1
      rules:
        # ── system.subtype = init  →  session.init ───────────────
        # Lifted by mobile's AppBar SessionInitChip + transcript
        # session.init card. Fields not present in the source frame
        # come through nil — the renderer dispatches on presence.
        # claude flips between camelCase and snake_case across SDK
        # releases (permissionMode vs permission_mode, mcpServers vs
        # mcp_servers, …); coalesce papers over the variants.
        - match: { type: system, subtype: init }
          emit:
            kind: session.init
            producer: agent
            payload:
              session_id:      "$.session_id"
              model:           "$.model"
              cwd:             "$.cwd"
              permission_mode: "$.permissionMode || $.permission_mode"
              tools:           "$.tools"
              mcp_servers:     "$.mcp_servers || $.mcpServers"
              slash_commands:  "$.slash_commands || $.slashCommands"
              agents:          "$.agents"
              skills:          "$.skills"
              plugins:         "$.plugins"
              version:         "$.claude_code_version || $.version"
              output_style:    "$.output_style || $.outputStyle"
              fast_mode_state: "$.fast_mode_state || $.fastModeState"

        # ── system.subtype = rate_limit_event  →  rate_limit ─────
        # v1.0.326 wedge: mid-SDK builds wrap the rate-limit signal
        # under a system envelope instead of emitting it as a
        # bare top-level type. v1.0.328 added the nested
        # rate_limit_info shape; the same coalesce handles all three.
        - match: { type: system, subtype: rate_limit_event }
          emit:
            kind: rate_limit
            producer: agent
            payload:
              window:    "$.rate_limit_info.rateLimitType || $.rateLimitType || $.rate_limit_type"
              status:    "$.rate_limit_info.status || $.status"
              resets_at: "$.rate_limit_info.resetsAt || $.resetsAt || $.resets_at"
              overage_status:   "$.rate_limit_info.overageStatus || $.overageStatus || $.overage_status"
              is_using_overage: "$.rate_limit_info.isUsingOverage || $.isUsingOverage || $.is_using_overage"
              reason:           "$.rate_limit_info.overageDisabledReason || $.overageDisabledReason || $.overage_disabled_reason"

        # ── system (any other subtype)  →  system ────────────────
        # task_started / task_updated / task_notification all land
        # here and are folded by the mobile _systemBody renderer
        # into one-liners. Anything we don't model gets the full
        # frame so the transcript stays complete. payload_expr passes
        # the whole frame through verbatim (matches legacy semantics
        # where PostAgentEvent(..., "system", ..., frame) shipped the
        # entire JSON object).
        - match: { type: system }
          emit:
            kind: system
            producer: agent
            payload_expr: "$."

        # ── rate_limit_event (top-level)  →  rate_limit ──────────
        # Older SDK builds emit rate_limit_event as a bare top-level
        # type. Same coalesce as the system-wrapped variant; the
        # author chose two rules over one match-with-no-subtype-key
        # because the dispatch becomes opaque otherwise.
        - match: { type: rate_limit_event }
          emit:
            kind: rate_limit
            producer: agent
            payload:
              window:    "$.rate_limit_info.rateLimitType || $.rateLimitType || $.rate_limit_type"
              status:    "$.rate_limit_info.status || $.status"
              resets_at: "$.rate_limit_info.resetsAt || $.resetsAt || $.resets_at"
              overage_status:   "$.rate_limit_info.overageStatus || $.overageStatus || $.overage_status"
              is_using_overage: "$.rate_limit_info.isUsingOverage || $.isUsingOverage || $.is_using_overage"
              reason:           "$.rate_limit_info.overageDisabledReason || $.overageDisabledReason || $.overage_disabled_reason"

        # ── assistant.message.content[]  →  text / tool_call ─────
        # for_each walks the content blocks; sub_rules dispatch on
        # the inner block type. Outer scope ($$) gives sub-rules
        # access to message.id for transcript pairing.
        - match: { type: assistant }
          for_each: $.message.content
          sub_rules:
            - match: { type: text }
              emit:
                kind: text
                producer: agent
                payload:
                  text:       "$.text"
                  message_id: "$$.message.id"
            - match: { type: tool_use }
              emit:
                kind: tool_call
                producer: agent
                payload:
                  id:    "$.id"
                  name:  "$.name"
                  input: "$.input"

        # ── assistant.message.usage  →  usage (when present) ─────
        # Telemetry strip in mobile; gated by when_present so it
        # doesn't fire empty rows for assistant frames that omit
        # the usage block (post-result deltas, for example).
        - match: { type: assistant }
          when_present: $.message.usage
          emit:
            kind: usage
            producer: agent
            payload:
              input_tokens:  "$.message.usage.input_tokens"
              output_tokens: "$.message.usage.output_tokens"
              cache_read:    "$.message.usage.cache_read_input_tokens || $.message.usage.cache_read"
              cache_create:  "$.message.usage.cache_creation_input_tokens || $.message.usage.cache_create"
              service_tier:  "$.message.usage.service_tier"
              message_id:    "$.message.id"
              model:         "$.message.model"

        # ── user.message.content[].type=tool_result  →  tool_result ─
        # In stream-json, `user` frames carry the agent's own view
        # of tool outputs. Plain user-text frames are our own input
        # being echoed back — the legacy translator skips those by
        # filtering to tool_result blocks; we mirror via sub_rules.
        - match: { type: user }
          for_each: $.message.content
          sub_rules:
            - match: { type: tool_result }
              emit:
                kind: tool_result
                producer: agent
                payload:
                  tool_use_id: "$.tool_use_id"
                  content:     "$.content"
                  is_error:    "$.is_error"

        # ── result  →  turn.result + completion ──────────────────
        # turn.result is the canonical typed kind; completion is a
        # deprecated alias kept for one release per ADR. Both rules
        # match {type: result} (specificity tie) so they co-fire.
        # Note: modelUsage's inner-key renaming (camelCase →
        # snake_case) is a known parity gap — the v1 grammar lacks a
        # map-iter construct, so by_model passes through verbatim.
        # Tracked for grammar extension after the parity test
        # surfaces the real diff. See plan Phase 1.5.
        - match: { type: result }
          emit:
            kind: turn.result
            producer: agent
            payload:
              cost_usd:           "$.total_cost_usd || $.cost_usd"
              duration_ms:        "$.duration_ms"
              num_turns:          "$.num_turns"
              terminal_reason:    "$.terminal_reason || $.subtype"
              permission_denials: "$.permission_denials"
              fast_mode_state:    "$.fast_mode_state || $.fastModeState"
              by_model:           "$.modelUsage || $.model_usage"
        - match: { type: result }
          emit:
            kind: completion
            producer: agent
            # Deprecated alias kept for one release per ADR-010
            # plan §4.2. Legacy emits the whole frame as payload;
            # payload_expr preserves that for parity. Drop this rule
            # once telemetry shows nothing reads kind=completion.
            payload_expr: "$."

        # ── error  →  error ──────────────────────────────────────
        # Legacy ships the whole frame as payload — error structure
        # varies enough that lifting specific fields would lose
        # forward compatibility. payload_expr matches legacy.
        - match: { type: error }
          emit:
            kind: error
            producer: agent
            payload_expr: "$."

        # No catch-all: unmatched frames fall through to ApplyProfile's
        # implicit kind=raw, payload=verbatim fallback (ADR-010 D5).
        # Forward-compatible with new SDK frame types we haven't
        # profiled yet.
  - family: gemini-cli
    bin: gemini
    version_flag: --version
    supports: [M1, M2, M4]
    # ADR-021 D3 / W1.4 — default ACP authentication method when the
    # steward template doesn't specify one. oauth-personal targets the
    # single-user-developer case (the most common termipod deployment):
    # `gemini auth` once on the host caches tokens at
    # ~/.gemini/oauth_creds.json; the daemon reuses them without
    # opening a browser. Service-account / shared-host deployments
    # override via auth_method: gemini-api-key on the steward template.
    default_auth_method: oauth-personal
    # ADR-021 D4 / W2.1 — gemini supports two driving modes with
    # different mode-switch protocols. M1 (gemini --acp) accepts
    # session/set_mode and session/set_model RPCs against the live
    # daemon (W2.2). M2 (gemini -p exec-per-turn) has no in-process
    # handshake; the driver stashes overrides and splices them into the
    # next subprocess argv (W2.4). Single-string per-family declaration
    # couldn't disambiguate, so we key by driving_mode.
    runtime_mode_switch:
      M1: rpc
      M2: per_turn_argv
    # ADR-021 D5 / W4.5–W4.6 — gemini's M1 (--acp) accepts ACP image
    # content blocks (driver wire shape in W4.4); M2 (gemini -p) has
    # no inline-image affordance, so the driver strips and warns
    # (W4.5). Mobile composer reads this map to gate the inline image
    # attach affordance per active driving_mode.
    prompt_image:
      M1: true
      M2: false
      M4: false
    # Gemini, like codex, uses the profile translator authoritatively:
    # there is no legacy hardcoded path for the exec-per-turn-with-resume
    # driver (ADR-013). Dispatch is on the top-level `type` field, the
    # same shape claude-code's stream-json uses, so no evaluator
    # extension is required for gemini.
    frame_translator: profile
    frame_profile:
      description: |
        gemini-cli stream-json (`gemini -p ... --output-format
        stream-json`) → typed agent_events. ADR-013 is the
        authoritative design.

        Dispatch is on the top-level `type` field. Most-specific match
        wins (largest match-keyset; declaration order on ties).

        Assistant text emission (verified against gemini-cli@0.41.2):
        the engine emits ONLY streaming chunks with `delta: true` —
        there is no final `delta: false` consolidation frame. We match
        `delta: true` and emit a `text` event per chunk; the mobile
        transcript renderer concatenates consecutive text/agent events
        from the same turn into one bubble. The earlier ADR-013 D7
        plan to emit on `delta: false` matched a protocol shape gemini
        never actually shipped.

        User echoes (role=user) still fall through to ApplyProfile's
        kind=raw fallback — the user's prompt is already in agent_events
        from the mobile POST, and re-emitting as text would duplicate
        the bubble.

        permission_prompt is unsupported on gemini (ADR-013 D4): the CLI
        offers only flag-time `--yolo` / `--approval-mode` and no
        in-stream gate. Stewards route risky decisions through
        request_approval (turn-based, vendor-neutral) instead.
      profile_version: 1
      rules:
        # ── init  →  session.init ────────────────────────────────
        # First frame of every turn. session_id is the resume cursor
        # we persist on agents.thread_id_json (ADR-013 D2) and thread
        # into the next spawn's `--resume <UUID>` argv.
        - match: { type: init }
          emit:
            kind: session.init
            producer: agent
            payload:
              session_id: "$.session_id"
              model:      "$.model"
              timestamp:  "$.timestamp"

        # No profile rule for assistant delta chunks. The
        # ExecResumeDriver special-cases {type: message, role: assistant,
        # delta: true} frames, accumulates the per-chunk content into a
        # per-turn buffer, and emits cumulative `kind: text` events with
        # `partial: true` + a turn-local `message_id`. That shape lets
        # the mobile transcript's _collapseStreamingPartials fold the
        # chain into a single bubble that grows. A profile rule can't do
        # this — frame translation is stateless by design and gemini
        # emits incremental deltas (not codex/claude's cumulative
        # snapshots). User echoes (role=user) still fall through to
        # ApplyProfile's kind=raw fallback so the prompt isn't
        # double-bubbled.

        # ── tool_use  →  tool_call ───────────────────────────────
        # Mirror of claude's assistant.message.content[type=tool_use].
        # tool_id pairs with tool_result on completion.
        - match: { type: tool_use }
          emit:
            kind: tool_call
            producer: agent
            payload:
              id:        "$.tool_id"
              name:      "$.tool_name"
              input:     "$.parameters"
              timestamp: "$.timestamp"

        # ── tool_result  →  tool_result ──────────────────────────
        # Mirror of claude's user.message.content[type=tool_result].
        # `is_error` is derived from `status != "success"` at the
        # mobile renderer for now — gemini ships the literal `status`
        # so we forward it unchanged and let the renderer decide.
        - match: { type: tool_result }
          emit:
            kind: tool_result
            producer: agent
            payload:
              tool_use_id: "$.tool_id"
              content:     "$.output"
              status:      "$.status"
              timestamp:   "$.timestamp"

        # ── result  →  turn.result ───────────────────────────────
        # Final completion summary; the per-turn equivalent of
        # claude's {type: result}. We flatten gemini's nested stats
        # block into the canonical hub turn.result shape so the
        # mobile transcript's token-usage aggregator (which keys on
        # `by_model` + duration_ms) lights up automatically. The full
        # raw stats are kept under `stats` so future telemetry rules
        # can lift extra fields without re-authoring this rule. cost_usd
        # is absent because gemini-cli doesn't ship it.
        - match: { type: result }
          emit:
            kind: turn.result
            producer: agent
            payload:
              status:        "$.status"
              duration_ms:   "$.stats.duration_ms"
              total_tokens:  "$.stats.total_tokens"
              input_tokens:  "$.stats.input_tokens"
              output_tokens: "$.stats.output_tokens"
              tool_calls:    "$.stats.tool_calls"
              by_model:      "$.stats.models"
              stats:         "$.stats"
              timestamp:     "$.timestamp"

        # ── error  →  error ──────────────────────────────────────
        # Non-fatal warnings + system errors. Same payload-verbatim
        # shape claude's profile uses — gemini's error structure is
        # under-specified upstream so lifting fields would lose
        # forward compatibility.
        - match: { type: error }
          emit:
            kind: error
            producer: agent
            payload_expr: "$."

        # No catch-all. Streaming message deltas
        # ({type:message, delta:true}) and any future event types
        # fall through to ApplyProfile's kind=raw fallback. ADR-013
        # accepts the raw rows for v1; a future wedge may filter or
        # promote them once the live-streaming UI lands.
  - family: codex
    bin: codex
    version_flag: --version
    supports: [M1, M2, M4]
    # ADR-021 D4 / W2.1 — codex's app-server JSON-RPC has no
    # session/set_mode equivalent; --model and --approval-policy are
    # flag-time only. Picker selection routes through respawn-with-
    # mutated-spec (W2.3). The thread/started cursor (ADR-012)
    # preserves transcript continuity across the respawn.
    runtime_mode_switch:
      M1: respawn
      M2: respawn
    # ADR-021 D5 / W4.3 — codex's app-server JSON-RPC `turn/start.input`
    # accepts content blocks including `{type:"input_image",
    # image_url:"data:..."}`. Driver wire shape lands in W4.3.
    prompt_image:
      M1: true
      M2: true
      M4: false
    # Codex uses the profile translator authoritatively — there is no
    # legacy hardcoded driver for app-server JSON-RPC the way there is
    # for claude-code's stream-json. ADR-012 D4: the dispatch field is
    # `method` rather than `type`; nested matchers like
    # `params.item.type` use the dotted-path extension to matchesAll.
    frame_translator: profile
    frame_profile:
      description: |
        codex app-server (JSON-RPC 2.0 notifications, line-delimited)
        → typed agent_events. ADR-012 is the authoritative design;
        protocol reference at developers.openai.com/codex/app-server.

        Dispatch is on `method`. Nested matchers like
        `params.item.type` walk dotted paths. Most-specific match
        wins (largest match-keyset; declaration order on ties).
        Unmatched frames fall through to ApplyProfile's
        kind=raw fallback so new methods stay forward-compatible.

        Item-shaped notifications (`item/started`, `item/completed`)
        dispatch on `params.item.type` to map onto our existing
        text/tool_call/tool_result vocabulary so the mobile renderer
        works with no per-engine branches. Streaming deltas
        (item/agentMessage/delta, outputDelta) are *not* emitted in
        v1 — we emit on completion instead, which keeps the
        transcript shape parallel with claude-code's. Streaming UI
        is a later wedge once the basic flow is proven.
      profile_version: 1
      rules:
        # ── thread/started  →  session.init ──────────────────────
        # Mirror of claude's system.init lift. session_id from the
        # thread payload is what we persist on the agents row to
        # drive thread/resume on host-runner restart (ADR-012 D2).
        # Most fields claude's profile carries (cwd, tools list,
        # mcp_servers, slash_commands) come through other channels
        # in app-server — we just publish what's in the notification
        # and let the renderer treat absent fields as "this driver
        # doesn't surface that signal".
        - match: { method: thread/started }
          emit:
            kind: session.init
            producer: agent
            payload:
              session_id: "$.params.thread.id"
              preview:    "$.params.thread.preview"
              ephemeral:  "$.params.thread.ephemeral"
              # Prefer concrete model name (`$.thread.model`) over the
              # umbrella provider (`$.thread.modelProvider`) when both
              # are present — codex carries the provider always but
              # only newer builds carry the model. Fall back so older
              # codex still surfaces something rather than blank.
              model:      "$.params.thread.model || $.params.thread.modelProvider"
              created_at: "$.params.thread.createdAt"

        # ── thread/status/changed  →  system ─────────────────────
        # The mobile feed renders system events with a one-liner
        # via _systemBody. status payloads are small enough to ship
        # whole.
        - match: { method: thread/status/changed }
          emit:
            kind: system
            producer: agent
            payload_expr: "$.params"

        # ── turn/started  →  system marker ───────────────────────
        # claude doesn't emit per-turn start events; codex does.
        # We surface them as system markers so a transcript replay
        # of a codex session shows the same turn boundaries the
        # principal saw live, but we don't promote them to a typed
        # kind because nothing in the renderer needs the boundary
        # for layout (the agentMessage events themselves anchor
        # turns visually).
        - match: { method: turn/started }
          emit:
            kind: system
            producer: agent
            payload:
              kind:    "\"turn_started\""
              turn_id: "$.params.turn.id"

        # ── turn/completed  →  turn.result ───────────────────────
        # Maps onto the same canonical kind claude's profile emits.
        # Field set is sparser than claude — codex doesn't ship
        # cost_usd or duration_ms via this notification (token
        # usage rides on thread/tokenUsage/updated separately) —
        # absent fields land as nil and the renderer hides them.
        - match: { method: turn/completed }
          emit:
            kind: turn.result
            producer: agent
            payload:
              turn_id:        "$.params.turn.id"
              status:         "$.params.turn.status"
              terminal_reason: "$.params.turn.error.message"

        # ── turn/diff/updated  →  system ─────────────────────────
        # Unified diff snapshot after each FileChange. Renderer can
        # surface this in a "changes this turn" pill; for v1 we just
        # publish the payload so it's visible in raw transcripts.
        - match: { method: turn/diff/updated }
          emit:
            kind: system
            producer: agent
            payload_expr: "$.params"

        # ── turn/plan/updated  →  system ─────────────────────────
        # Codex's planning surface; we echo it as system. A future
        # wedge could promote this to its own kind once the mobile
        # plan-renderer lands.
        - match: { method: turn/plan/updated }
          emit:
            kind: system
            producer: agent
            payload_expr: "$.params"

        # ── item/started  +  params.item.type=agentMessage  →  ──
        # *Skipped*: agentMessage's content arrives via deltas we
        # don't emit in v1 and is finalized in item/completed. No
        # rule = falls to raw fallback; for this specific shape we
        # don't even want raw rows polluting the transcript, so we
        # emit a no-op-ish kind=system marker that the renderer can
        # drop. Cleaner alternative would be a "skip" emit type;
        # tracked as a grammar follow-up.
        - match:
            method: item/started
            params.item.type: agentMessage
          emit:
            kind: system
            producer: agent
            payload:
              kind:      "\"agent_message_started\""
              item_id:   "$.params.item.id"

        # ── item/started  +  commandExecution / fileChange / mcpToolCall  →  tool_call ──
        # Three flavors of "the agent is starting work" map to the
        # same typed kind, mirroring claude's tool_use. The payload
        # carries the engine-specific shape so the renderer can
        # show the right summary (command vs. patch vs. mcp tool).
        - match:
            method: item/started
            params.item.type: commandExecution
          emit:
            kind: tool_call
            producer: agent
            payload:
              id:        "$.params.item.id"
              name:      "\"commandExecution\""
              input:     "$.params.item"
        - match:
            method: item/started
            params.item.type: fileChange
          emit:
            kind: tool_call
            producer: agent
            payload:
              id:        "$.params.item.id"
              name:      "\"fileChange\""
              input:     "$.params.item"
        - match:
            method: item/started
            params.item.type: mcpToolCall
          emit:
            kind: tool_call
            producer: agent
            payload:
              id:        "$.params.item.id"
              name:      "$.params.item.tool"
              server:    "$.params.item.server"
              input:     "$.params.item.arguments"
        - match:
            method: item/started
            params.item.type: webSearch
          emit:
            kind: tool_call
            producer: agent
            payload:
              id:        "$.params.item.id"
              name:      "\"webSearch\""
              input:     "$.params.item"

        # ── item/completed  +  params.item.type=agentMessage  →  text ──
        # Final assistant text — the equivalent of claude's
        # assistant.message.content[type=text]. We don't currently
        # have a message_id concept upstream of the renderer beyond
        # threading, so we use item.id as the stable handle.
        - match:
            method: item/completed
            params.item.type: agentMessage
          emit:
            kind: text
            producer: agent
            payload:
              text:       "$.params.item.text"
              message_id: "$.params.item.id"
              phase:      "$.params.item.phase"

        # ── item/completed  +  commandExecution / fileChange / mcpToolCall  →  tool_result ──
        # Mirrors claude's user.message.content[type=tool_result].
        # tool_use_id pairs with the tool_call we emitted at start.
        - match:
            method: item/completed
            params.item.type: commandExecution
          emit:
            kind: tool_result
            producer: agent
            payload:
              tool_use_id: "$.params.item.id"
              content:     "$.params.item.aggregatedOutput"
              exit_code:   "$.params.item.exitCode"
              duration_ms: "$.params.item.durationMs"
              status:      "$.params.item.status"
        - match:
            method: item/completed
            params.item.type: fileChange
          emit:
            kind: tool_result
            producer: agent
            payload:
              tool_use_id: "$.params.item.id"
              changes:     "$.params.item.changes"
              status:      "$.params.item.status"
        - match:
            method: item/completed
            params.item.type: mcpToolCall
          emit:
            kind: tool_result
            producer: agent
            payload:
              tool_use_id: "$.params.item.id"
              content:     "$.params.item.result"
              is_error:    "$.params.item.error"
              status:      "$.params.item.status"

        # ── thread/tokenUsage/updated  →  usage ──────────────────
        # Token telemetry. The real codex frame nests counts as
        # `params.tokenUsage.total.{inputTokens,outputTokens,
        # cachedInputTokens,totalTokens,reasoningOutputTokens}` plus
        # `params.tokenUsage.modelContextWindow`. The earlier draft
        # of this rule lifted `params.usage.input_tokens` (snake_case
        # under a non-existent `usage` key) — those expressions
        # resolved to nil so the strip silently rendered nothing.
        #
        # Each notification carries *cumulative* totals (not per-turn
        # deltas). The `cumulative: "true"` marker tells the mobile
        # aggregator the latest event replaces; without it, the
        # aggregator would have to sniff payload shape (claude's
        # usage events are per-message deltas and have no marker).
        # The profile evaluator's grammar has no boolean literal, so
        # we emit the string `"true"` and the mobile side accepts
        # either bool true or string "true".
        - match: { method: thread/tokenUsage/updated }
          emit:
            kind: usage
            producer: agent
            payload:
              cumulative:          "\"true\""
              engine:              "\"codex\""
              input_tokens:        "$.params.tokenUsage.total.inputTokens"
              output_tokens:       "$.params.tokenUsage.total.outputTokens"
              cached_input_tokens: "$.params.tokenUsage.total.cachedInputTokens"
              total_tokens:        "$.params.tokenUsage.total.totalTokens"
              reasoning_tokens:    "$.params.tokenUsage.total.reasoningOutputTokens"
              context_window:      "$.params.tokenUsage.modelContextWindow"
              thread_id:           "$.params.threadId"

        # ── account/rateLimits/updated  →  rate_limit ───────────
        # codex bundles primary + secondary windows; we surface
        # primary (the one most likely to throttle) and let
        # `payload.secondary` ride along for any UI that wants the
        # weekly window too.
        - match: { method: account/rateLimits/updated }
          emit:
            kind: rate_limit
            producer: agent
            payload:
              window:    "$.params.rateLimits.primary.windowDurationMins"
              status:    "$.params.rateLimits.rateLimitReachedType"
              resets_at: "$.params.rateLimits.primary.resetsAt"
              used_pct:  "$.params.rateLimits.primary.usedPercent"
              secondary: "$.params.rateLimits.secondary"

        # ── mcpServer/startupStatus/updated  →  system ──────────
        # Visible in the transcript so a misconfigured mcp server
        # surfaces (status=failed with error) instead of failing
        # silently the way claude's session.init.mcp_servers list
        # implicitly does.
        - match: { method: mcpServer/startupStatus/updated }
          emit:
            kind: system
            producer: agent
            payload:
              kind:   "\"mcp_server_startup\""
              name:   "$.params.name"
              status: "$.params.status"
              error:  "$.params.error"

        # No catch-all: unmatched methods (the per-item delta
        # streams we don't emit, plus anything new the upstream
        # ships) fall through to ApplyProfile's kind=raw fallback.
        # That keeps the profile forward-compatible — a v1 hub
        # talking to a v2 app-server still records the new
        # notifications verbatim instead of erroring out.
