# Built-in steward template. Copied to team/templates/agents/ on first init.
# User edits win — subsequent init calls never overwrite.
template: agents.steward
version: 1
extends: null

# Drive claude in M2 (structured stdio) so we can render its turns as a
# chat transcript and gate tool use through the permission_prompt MCP
# tool. M4 fallback is the runner's own (still useful for hosts that
# don't expose the MCP gateway port).
driving_mode: M2
fallback_modes: [M4]

backend:
  kind: claude-code
  # The hub binds {{model}} from this field; {{permission_flag}} resolves
  # from the claude-code family's permission_modes (ADR-043 P3) keyed by
  # the spawn request's permission_mode (skip / prompt). To change the
  # model, edit `model` and re-spawn. To add a new permission mode (e.g.
  # "ask-once") for every claude persona, extend the family's
  # permission_modes; to override it for THIS template only, add a local
  # permission_modes map here (an explicit map wins over the family).
  model: claude-opus-4-7
  # default_workdir intentionally omitted. The launcher derives
  # ~/hub-work/<pid8>/<handle> from project_id + handle so two project
  # stewards on one host don't collide on the same .mcp.json /
  # .claude/settings.local.json. Templates that need a stable shared
  # path (general steward, infra steward) opt back in by setting it.
  # cmd carries the bin + persona intent ({{model}}, {{permission_flag}}).
  # The mode-selecting argv that puts claude into M2 structured stdio is
  # NOT written here — it lives on the claude-code family's
  # launch.M2.mode_args (ADR-043) and the launcher appends it, so a
  # persona can't omit a flag and ship a cmd that runs interactive. Those
  # family-owned flags, for reference:
  #   --print                          non-interactive (no TUI repl).
  #   --output-format stream-json      one JSON object per line on stdout.
  #   --input-format  stream-json      reads user turns as JSON frames on
  #                                    stdin so the process stays alive
  #                                    across turns. Without this flag,
  #                                    --print exits after a single reply.
  #   --verbose                        required by claude-code when
  #                                    combining --print with stream-json
  #                                    output; without it the CLI rejects
  #                                    the flag combination.
  cmd: "claude --model {{model}} {{permission_flag}}"

default_role: team.coordinator
display_label: "Steward"

default_capabilities:
  - blob.read
  - blob.write
  - delegate
  - decision.vote: significant
  - spawn.descendants: 20
  - templates.read
  - templates_propose
  - tasks_create
  - tasks.assign_others
  - projects_create

prompt: steward.v1.md

# Advertised A2A skills. Consumed by host-runner when serving the
# agent-card at /a2a/<id>/.well-known/agent.json. Keeping skills in the
# template (not hardcoded in the hub) means adding a new agent kind is a
# drop-in YAML, not a code change.
skills:
  - id: plan
    name: plan
    description: "Decompose a project goal into plan steps"
    tags: [planning]
  - id: brief
    name: brief
    description: "Write a briefing document summarizing run outputs"
    tags: [writing]

default_channels:
  hub-meta: full
