name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          # pubspec.lock is gitignored, so hashFiles('pubspec.lock') is
          # always empty — hash pubspec.yaml so the cache invalidates
          # when deps change. No restore-keys fallback: a mismatched
          # .dart_tool from a prior pubspec.yaml can hide newly-added
          # packages from the analyzer even after `flutter pub get`.
          key: pub-${{ hashFiles('pubspec.yaml') }}

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Debug package config
        run: |
          echo '--- package_config.json entries ---'
          grep -oE '"name": "[^"]+"' .dart_tool/package_config.json | head -80
          echo '--- sqflite entries ---'
          grep -i sqflite .dart_tool/package_config.json || echo 'NOT FOUND'

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --exclude-tags=screenshot
