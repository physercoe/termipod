name: Desktop Release

# WS8 packaging — builds the desktop control plane into installable bundles for
# all three desktop OSes (there is no local Rust toolchain, so the installers are
# produced here). Run manually (Actions ▸ Desktop Release ▸ Run workflow) or by
# pushing a `desktop-v*` tag. Installers are uploaded as run artifacts; a tag
# also attaches them to a GitHub release.

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bundle:
    name: Bundle (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: linux
            args: ''
            rust-targets: ''
          - platform: macos-latest
            label: macos-universal
            args: '--target universal-apple-darwin'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          - platform: windows-latest
            label: windows
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Linux bundle dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.platform }}-cargo-release-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: ${{ matrix.platform }}-cargo-release-

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build + bundle (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing (required by tauri-plugin-updater). Set these repo
          # secrets before tagging a release, else bundling fails on signing:
          #   gh secret set TAURI_SIGNING_PRIVATE_KEY < private.key
          #   gh secret set TAURI_SIGNING_PRIVATE_KEY_PASSWORD < password.txt
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          args: ${{ matrix.args }}
          # On a desktop-v* tag, create/attach a GitHub release; on manual runs,
          # tagName is empty so tauri-action just builds (artifacts uploaded below).
          tagName: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && github.ref_name || '' }}
          # format() — a nested ${{ }} inside a string literal is NOT expanded.
          releaseName: ${{ startsWith(github.ref, 'refs/tags/desktop-v') && format('TermiPod Desktop {0}', github.ref_name) || '' }}
          # PUBLISHED (not draft): the updater endpoint resolves
          # releases/latest/download/latest.json, which only sees a published,
          # non-prerelease release. tauri-action also uploads the signed
          # latest.json here (createUpdaterArtifacts in tauri.conf.json).
          releaseDraft: false

      - name: Upload installers as run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termipod-desktop-${{ matrix.label }}
          if-no-files-found: warn
          path: |
            desktop/src-tauri/target/release/bundle/**/*.AppImage
            desktop/src-tauri/target/release/bundle/**/*.deb
            desktop/src-tauri/target/release/bundle/**/*.rpm
            desktop/src-tauri/target/release/bundle/**/*.dmg
            desktop/src-tauri/target/release/bundle/**/*.msi
            desktop/src-tauri/target/release/bundle/**/*.exe
            desktop/src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
