name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  hub:
    name: Hub (Go) build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: hub/go.sum

      - name: Build
        working-directory: hub
        run: go build ./...

      - name: Test
        working-directory: hub
        run: go test ./...

      - name: Vet
        working-directory: hub
        run: go vet ./...

  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint docs
        # Enforces docs/doc-spec.md §3 status block, resolved-discussion
        # forward links, and cross-reference resolution. Fast (pure
        # bash + grep), runs first so doc drift is caught early.
        run: scripts/lint-docs.sh

      - name: Lint glossary
        # Enforces docs/doc-spec.md §7 — every glossary heading has a
        # body, the §12 confusion-pairs index resolves, and known-bad
        # spelling variants for canonical terms (host-runner,
        # app-server, etc.) don't drift back into prose. Code-context
        # occurrences (backticked identifiers, file paths, fenced
        # blocks) are excluded so Go package paths like
        # `hub/internal/hostrunner` don't false-flag.
        run: scripts/lint-glossary.sh

      - name: Lint doc anchors
        # Enforces docs/doc-spec.md §6.2 verify-claim markers — every
        # `<!-- verify <kind> <args> -->` resolves against current
        # code. Catches drift on rename/move/delete of cited symbols,
        # migrations, and file globs. Rationale +
        # adoption plan in docs/discussions/doc-freshness-maintenance.md.
        run: scripts/lint-doc-anchors.sh

      - name: Lint governed actions
        # ADR-030 W3 — keeps three sources of truth in lockstep:
        # the propose-kind registry (statically grepped from
        # hub/internal/server/*.go for RegisterProposeKind calls),
        # the policy.yaml `kinds:` block (any committed fixture
        # is auto-discovered), and the kind-shape + escalate-on-
        # timeout safety constraints. FAIL on registry⇄policy
        # mismatch or bad kind name; WARN on no-policy-found
        # when the registry is non-empty.
        run: scripts/lint-governed-actions.sh

      - name: Lint legacy markers
        # WS1.5 forward-only ratchet — fails when a NEW legacy/deprecated/
        # alias marker appears in a hub/**.go or lib/**.dart comment unless
        # it names a removal target (a removal verb or an issue ref). The
        # existing set is grandfathered in scripts/legacy-marker-baseline.txt;
        # the linter only blocks net-new undocumented compatibility debt.
        run: scripts/lint-legacy-markers.sh

      - name: Validate OpenAPI spec
        # Enforces docs/reference/openapi.yaml validates against the
        # OpenAPI 3.x schema. Per docs/plans/doc-uplift.md P2.8 §5.8.
        run: scripts/lint-openapi.sh

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          # pubspec.lock is gitignored, so hashFiles('pubspec.lock') is
          # always empty — hash pubspec.yaml so the cache invalidates
          # when deps change. No restore-keys fallback: a mismatched
          # .dart_tool from a prior pubspec.yaml can hide newly-added
          # packages from the analyzer even after `flutter pub get`.
          key: pub-${{ hashFiles('pubspec.yaml') }}

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --exclude-tags=screenshot
