name: termipod
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.568-alpha+10568

environment:
  sdk: ^3.10.7

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: 1.0.8
  dartssh2: 2.13.0
  flutter_riverpod: 3.1.0
  flutter_secure_storage: 10.0.0
  local_auth: 3.0.0
  shared_preferences: 2.5.4
  uuid: 4.5.2
  google_fonts: 6.3.3
  # SSH key management dependencies
  file_picker: 8.3.7
  cryptography: 2.9.0
  pointycastle: 3.9.1
  crypto: 3.0.7
  # Image transfer
  image_picker: 1.2.1
  image: 4.7.2
  flutter_image_compress: 2.4.0
  # Settings/notifications
  url_launcher: 6.3.2
  # Background SSH connection maintenance
  flutter_foreground_task: 8.17.0
  # Local notifications (Phase 1.5a — push notifications for new
  # attention items, agent finish, session paused). Killed-state
  # delivery comes via ntfy in Phase 1.5b.
  flutter_local_notifications: 19.4.2
  # Keep screen on
  wakelock_plus: 1.4.0
  # Network connectivity monitoring
  connectivity_plus: 6.1.5
  # File download (temp dir + share intent)
  path_provider: ^2.1.0
  share_plus: ^10.0.0
  # Headless VT state machine for raw PTY backend
  xterm: ^4.0.0
  # Public Downloads on Android via MediaStore (no-op on iOS).
  # iOS uses Info.plist UIFileSharingEnabled instead.
  media_store_plus: ^0.1.3
  # Markdown rendering for Docs viewer in hub project detail
  flutter_markdown: ^0.7.4
  # Direct markdown parser dep (also pulled in transitively by
  # flutter_markdown) — used to type custom MarkdownElementBuilder
  # closures that override fenced-code rendering with syntax highlights.
  markdown: ^7.2.2
  # Syntax highlighting for fenced code blocks in agent transcripts.
  # Static highlight.js port; covers ~190 languages with built-in themes.
  flutter_highlight: ^0.7.0
  # LaTeX math rendering for agent transcripts ($...$ inline, $$...$$
  # display). Self-contained — bundles its own KaTeX-style fonts so
  # output is consistent across devices.
  flutter_math_fork: ^0.7.4
  # Offline snapshot cache for hub list/get responses. SQLite fits the
  # "mutable server content" storage tier; SharedPreferences is reserved
  # for stable config/metadata.
  sqflite: ^2.4.0
  # PDF viewer for `pdf`-kind artifacts (wave 2 W2 of the
  # artifact-type-registry plan). PDFium-backed; pinch zoom, text
  # search/selection, outline, password support built-in. ~2 MB APK
  # cost — see open-question Q10 if APK split lands.
  # pdfrx pinned to 2.2.24 (the last 2.2.x release) instead of 2.3.x
  # because 2.3.0 migrated pdfium_flutter to Dart's native-assets
  # link hooks for the native binary, which requires Flutter
  # build-time experiment plumbing we don't have wired in CI. The
  # 2.3.x line ships as "pdfium: loading… forever" on our Android
  # release builds — `onDocumentLoadFinished` never fires because
  # the native lib never loads. 2.2.24 uses the prior platform-
  # channel mechanism that "just works" out of the box. v1.0.514
  # diagnostic strip showed bytes flowing but pdfium silent;
  # this is the cleanest backout of the regression.
  pdfrx: 2.2.24
  # Audio + video players for `audio` / `video` artifacts (wave 2 W6).
  # Both packages accept file paths but not raw bytes, so the viewers
  # download the artifact via HubClient.downloadBlobCached then stage
  # bytes into the app's temp dir before handing the path to the player.
  just_audio: ^0.10.4
  video_player: ^2.10.0
  # Sandboxed WebView for `canvas-app` artifacts (canvas-viewer plan
  # W2/W4). Navigation delegate restricts outbound to about:blank +
  # data: URIs + a small CDN allowlist; no postMessage bridge. ~2 MB
  # APK cost on Android (see canvas-viewer plan Q6).
  webview_flutter: ^4.10.0
  # Microphone capture for voice input (Path C — Alibaba
  # DashScope WebSocket ASR). Streams raw PCM16 16 kHz mono via
  # startStream(RecordConfig(encoder: pcm16bits)) — no file
  # roundtrip, no transcoding. See docs/plans/voice-input-path-c-
  # alibaba.md W1.
  #
  # Bumped to ^6.0.0 in v1.0.538 after the v1.0.537-alpha iOS
  # release build failed with "record_linux 0.7.2 missing
  # implementations" — the 5.x branch's transitive
  # `record_linux` lagged behind
  # `record_method_channel_platform_interface`'s newer signature.
  # The 6.x line ships aligned transitive deps. API shape is
  # backward-compatible for the surface we use
  # (AudioRecorder + hasPermission + startStream + stop / cancel /
  # dispose).
  record: ^6.0.0
  # WebSocket transport for the voice-input DashScope ASR client (W2
  # of the Path C plan). Mobile-only: IOWebSocketChannel.connect
  # forwards Authorization: Bearer headers to the server, which the
  # browser shim does not. No web target in v1.
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  # FFI-backed sqflite factory for unit tests (no platform channels).
  sqflite_common_ffi: ^2.3.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1E1E1E"
  adaptive_icon_foreground: "assets/icon/icon-foreground.png"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/icon/icon.png
    - assets/fonts/HackGenConsole-LICENSE.txt
    - assets/fonts/UDEVGothicNF-LICENSE.txt
    # Pre-bundled Google Fonts — prevents runtime fetching in tests and
    # provides offline fallback. google_fonts checks asset bundle first.
    - assets/fonts/google/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

  fonts:
    - family: HackGenConsole
      fonts:
        - asset: assets/fonts/HackGenConsole-Regular.ttf
        - asset: assets/fonts/HackGenConsole-Bold.ttf
          weight: 700
    - family: UDEVGothicNF
      fonts:
        - asset: assets/fonts/UDEVGothicNF-Regular.ttf
        - asset: assets/fonts/UDEVGothicNF-Bold.ttf
          weight: 700
