name: Desktop Electron Release

# ADR-055 M3.1/M3.4 packaging + release gate. Builds the Electron shell into
# installers for the three desktop OSes. There is no local Electron/native
# toolchain, so CI is the packaging gate.
#
# Release/tag scheme (M3.4 — this repo hosts TWO release lanes and GitHub's
# `releases/latest` belongs to the mobile lane, whose in-app checker reads it.
# The former Tauri lane — `desktop-v*` tags — was retired at the M3.4 cutover):
#   - mobile:  `v*` tags, published releases — own `releases/latest`.
#   - Electron: `electron-v*` tags. The release is created ON the pushed tag
#     (never a new tag — a new `v*` tag would fire the mobile workflows) and is
#     marked PRERELEASE so it can never capture `releases/latest` from the
#     mobile checker.
# The auto-update feed is therefore NOT the GitHub provider (it resolves via
# `releases/latest`): packaged apps poll the `generic` feed at
# `releases/download/electron-latest/` — a rolling prerelease that the
# `promote` dispatch below points at a verified version. Promotion IS the
# go-live switch.
#
# Flows:
#   - push `electron-v<version>` tag  → build all OSes, create/refresh the
#     prerelease `electron-v<version>` with installers + latest*.yml.
#   - Run workflow (no input)         → build only, artifacts on the run.
#   - Run workflow, promote=<version> → copy that release's assets onto the
#     rolling `electron-latest` feed release (go live; no rebuild).
#
# Channels (by tag suffix, or the workflow_dispatch `channel` input on a tagless
# run):
#   - alpha — UNSIGNED. Skips cert import + notarization entirely, so a build
#     finishes in minutes instead of waiting ~55 min on Apple's notary service
#     (the mac-signing latency blocker). For DEVICE TESTING only — Gatekeeper
#     will quarantine the unsigned .app/.dmg (right-click→Open, or `xattr -dr
#     com.apple.quarantine`); not for distribution.
#   - beta  — SIGNED + notarized (the flow below when a macOS cert is present).
# Both create a PRERELEASE on the pushed tag; the release notes state the channel.
#
# Signing/notarization are supplied by repo secrets when present. The env-var
# names electron-builder consumes are FIXED (CSC_LINK / CSC_KEY_PASSWORD for the
# macOS cert; APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID for
# notarytool); the "Configure signing" step below maps the repo's secret names
# onto them:
#   CSC_LINK                    ← secrets.CERTIFICATES_P12      (base64 of the
#                                 Developer ID Application .p12)
#   CSC_KEY_PASSWORD            ← secrets.CERTIFICATES_PASSWORD (the .p12 password)
#   APPLE_ID                    ← secrets.APPLE_ID
#   APPLE_APP_SPECIFIC_PASSWORD ← secrets.APPLE_APP_PASSWORD    (app-specific pw)
#   APPLE_TEAM_ID               ← secrets.APPLE_TEAM_ID
# Windows uses a different cert (WIN_CSC_LINK / WIN_CSC_KEY_PASSWORD, unset here).
# Absent, the build still produces unsigned installers — enough to gate the
# pipeline; signed builds are the cutover prerequisite (plan §5).

on:
  workflow_dispatch:
    inputs:
      promote:
        description: 'Version to promote to the electron-latest update feed (e.g. 2026.722.211). Leave empty to just build.'
        required: false
        default: ''
      channel:
        description: 'Build channel for a tagless run: alpha = unsigned (fast, device-test only), beta = signed+notarized. Tag runs infer this from the tag suffix.'
        required: false
        type: choice
        default: alpha
        options:
          - alpha
          - beta
  push:
    tags:
      # Two channels by tag SUFFIX: `-alpha` builds unsigned (device-test,
      # skips the ~55-min notarization wait); `-beta` (or a bare tag) builds
      # signed+notarized. Both create a prerelease on the pushed tag.
      - 'electron-v*'

permissions:
  contents: write # create releases + upload assets with GITHUB_TOKEN

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # The vault crypto WASM is a nodejs-target artifact — identical bytes on every
  # OS — so build it once here and share it, rather than installing Rust +
  # wasm-pack on all three packaging runners.
  wasm:
    name: Build vault WASM
    if: inputs.promote == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build vault-wasm (nodejs target)
        working-directory: desktop/vault-wasm
        run: wasm-pack build --target nodejs --release
      - uses: actions/upload-artifact@v4
        with:
          name: vault-wasm-pkg
          path: desktop/vault-wasm/pkg/
          if-no-files-found: error

  bundle:
    name: Bundle (${{ matrix.label }})
    needs: wasm
    if: inputs.promote == ''
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            label: linux
            builder-flag: --linux
          - platform: macos-latest
            label: macos
            builder-flag: --mac
          # Pinned to windows-2022 (VS 2022 = v17): windows-latest moved to a
          # runner with Visual Studio 18, which node-gyp 10.3.1 can't parse
          # ("unknown version undefined") and whose PowerShell VS probe overflows
          # (ERR_CHILD_PROCESS_STDIO_MAXBUFFER) — the node-pty rebuild then fails
          # to find a compiler. VS 2022 is node-gyp 10's supported toolchain.
          - platform: windows-2022
            label: windows
            builder-flag: --win
    runs-on: ${{ matrix.platform }}
    # 60 min: a signed+notarized macOS build is legitimately slow. osx-sign
    # passes `--timestamp` to codesign for EVERY file in the bundle (required for
    # notarization; sign.js:230-234), so each of ~150+ files makes a serial
    # network round-trip to Apple's timestamp server, which throttles the shared
    # runner IPs — signing alone ran ~25 min and blew the old 30-min cap before
    # notarization even started. Linux/Windows still finish in minutes; the cap
    # is only a ceiling. (An actual hang, e.g. a no-cert keychain probe, is
    # guarded separately by CSC_IDENTITY_AUTO_DISCOVERY.)
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # node-gyp (pinned to 10 via package overrides) needs Python for the
      # node-pty Electron-ABI rebuild; pin 3.11 so it has distutils regardless of
      # the runner default (3.12 removed it).
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # The vault WASM pkg, built once by the wasm job → the extraResource the
      # electron-builder config ships under Resources/vault-wasm/pkg.
      - uses: actions/download-artifact@v4
        with:
          name: vault-wasm-pkg
          path: desktop/vault-wasm/pkg

      # Frontend build (the app:// payload — extraResource under Resources/dist).
      # NODE_OPTIONS raises V8's old-space cap: the macos-latest arm64 runner has
      # only ~7 GB RAM, so Node auto-sizes the heap to ~2 GB and `vite build`
      # OOMs (exit 134) — the 16 GB Linux runner auto-sizes to ~4 GB and clears
      # it. Set on the CI step, NOT the repo build script (which stays default so
      # low-RAM dev hosts opt in explicitly).
      - name: Build frontend
        working-directory: desktop
        run: npm ci && npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      # Electron shell: install (WITH the electron binary — packaging needs it),
      # esbuild main+preload, then package. electron-builder ABI-rebuilds the
      # native addons (node-pty, @napi-rs/keyring) for the Electron runtime.
      - name: Install Electron shell deps
        working-directory: desktop/electron
        run: npm ci

      # Drop ssh2's OPTIONAL native dep `cpu-features` (+ its build helper
      # `buildcheck`). ssh2 try/catches the require, so removing it just disables
      # a CPU cipher-preference optimization — and it keeps the rebuild set to the
      # one module that actually needs it. NOT `--omit=optional` on npm ci —
      # @napi-rs/keyring's platform binaries are optionalDependencies we need.
      - name: Strip cpu-features (unneeded native dep)
        working-directory: desktop/electron
        shell: bash
        run: rm -rf node_modules/cpu-features node_modules/buildcheck

      # ABI-rebuild node-pty for the Electron runtime with PLAIN node-gyp, NOT
      # @electron/rebuild (issue #358): electron-builder 25.1.8 pins
      # @electron/rebuild 3.6.1, whose forked node-gyp worker deadlocks in its
      # handshake — the worker parks in kevent waiting for a task message that
      # never arrives, BEFORE any module compiles. That's why stripping
      # cpu-features (merely the first module in the list) changed nothing, and
      # why `electron-rebuild -o node-pty` hangs identically. Plain node-gyp on
      # the same module builds in ~30s. npmRebuild:false (electron-builder.yml)
      # keeps the packager from re-invoking the broken rebuilder; node-pty is the
      # only native addon that needs a rebuild (@napi-rs/keyring is N-API prebuilt).
      # --dist-url gives node-gyp the Electron 43.x headers + (on Windows) node.lib.
      - name: Rebuild node-pty for Electron ABI (plain node-gyp)
        working-directory: desktop/electron
        shell: bash
        timeout-minutes: 12
        run: |
          npm install -g node-gyp@^10
          EV=$(node -p "require('electron/package.json').version")
          ARCH=$(node -p "process.arch")
          echo "Rebuilding node-pty for Electron $EV ($ARCH)"
          cd node_modules/node-pty
          node-gyp rebuild --target="$EV" --arch="$ARCH" --dist-url=https://electronjs.org/headers
          ls -la build/Release/*.node

      - name: Build shell bundle (esbuild)
        working-directory: desktop/electron
        run: npm run build

      # Stamp the real product version (desktop/package.json) into the electron
      # package so app.getVersion() and the electron-updater version comparison
      # are correct; the committed value stays 0.0.0-dev (bumped only at release).
      - name: Sync packaged version
        shell: bash
        run: |
          V=$(node -p "require('./desktop/package.json').version")
          node -e "const f='./desktop/electron/package.json',p=require(f);p.version='$V';require('fs').writeFileSync(f,JSON.stringify(p,null,2)+'\n')"
          echo "packaged version = $V"

      # Resolve the build channel: `-alpha`/`-beta` tag suffix wins; else the
      # workflow_dispatch `channel` input; else beta (signed) as the safe
      # default for a bare tag. Exposed as $CHANNEL for the signing step.
      - name: Resolve channel
        shell: bash
        run: |
          REF='${{ github.ref_name }}'
          IN='${{ inputs.channel }}'
          case "$REF" in
            *-alpha) CH=alpha ;;
            *-beta)  CH=beta ;;
            *)       CH="${IN:-beta}" ;;
          esac
          echo "CHANNEL=$CH" >> "$GITHUB_ENV"
          echo "channel = $CH"

      # Export the signing/notarization secrets to the job env ONLY when they are
      # actually set. Passing `CSC_LINK: ${{ secrets.CSC_LINK }}` directly exports
      # an EMPTY string when the secret is absent, and electron-builder then treats
      # CSC_LINK as "defined" and resolves it as a cert path relative to the app
      # dir → `⨯ desktop/electron not a file`, failing the macOS/Windows Package.
      # Skipping empty vars leaves signing genuinely unconfigured, so unsigned
      # installers build cleanly; a real cert flows through untouched.
      #
      # ALPHA short-circuits: it exports NO cert/notarization secrets (so the
      # build is unsigned and never calls notarytool) but STILL pins
      # CSC_IDENTITY_AUTO_DISCOVERY=false — skipping that would let a headless
      # runner with no keychain identity hang on the discovery probe (the reason
      # it defaults false here).
      - name: Configure signing (beta only; alpha builds unsigned)
        shell: bash
        env:
          # Map this repo's secret names onto the fixed env-var names
          # electron-builder / notarytool read (see header comment).
          CSC_LINK: ${{ secrets.CERTIFICATES_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.CERTIFICATES_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "$CHANNEL" != "beta" ]; then
            # alpha: unsigned by design — no cert, no notarization, but never
            # probe the keychain (would hang headless).
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "channel=$CHANNEL → unsigned (device test); signing skipped"
            exit 0
          fi
          for v in CSC_LINK CSC_KEY_PASSWORD WIN_CSC_LINK WIN_CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -n "${!v}" ]; then
              printf '%s<<__EOF__\n%s\n__EOF__\n' "$v" "${!v}" >> "$GITHUB_ENV"
              echo "signing: $v is set"
            fi
          done
          # electron-builder skips macOS code signing when
          # CSC_IDENTITY_AUTO_DISCOVERY=false EVEN with a cert imported via
          # CSC_LINK (observed: "skipped macOS application code signing …
          # CSC_IDENTITY_AUTO_DISCOVERY=false" — the identity is in the temp
          # keychain but never used). So enable discovery when the macOS cert is
          # present, and keep it OFF otherwise (a headless runner with no cert
          # hangs on the keychain identity probe — the reason it defaulted false).
          if [ -n "$CSC_LINK" ]; then
            echo "CSC_IDENTITY_AUTO_DISCOVERY=true" >> "$GITHUB_ENV"
            echo "signing: macOS identity discovery enabled"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "signing: no macOS cert — identity discovery disabled"
          fi

      # Publishing is done by the `release` job below (gh CLI on the pushed
      # tag), NEVER by electron-builder — its GitHub publisher would create a
      # `v<version>` tag, which is the mobile lanes' trigger namespace.
      - name: Package (electron-builder, unsigned unless secrets present)
        working-directory: desktop/electron
        run: npx electron-builder ${{ matrix.builder-flag }} --publish never
        env:
          # Verbose so a hang leaves a diagnostic trail before the job timeout.
          # Include the electron-osx-sign namespace so per-file codesign +
          # notarytool progress is visible (osx-sign logs under its own `debug`
          # namespace — with only `electron-builder` the signing phase looks
          # silent even while it churns through per-file timestamp calls).
          DEBUG: electron-builder,electron-osx-sign
          # NOTE: CSC_IDENTITY_AUTO_DISCOVERY is NOT set here on purpose — it is
          # exported via $GITHUB_ENV by the "Configure signing" step above (true
          # when a macOS cert is present so signing actually runs, false when
          # absent so the keychain probe can't hang). A hardcoded value here would
          # override that (step env wins over $GITHUB_ENV). The CSC_*/APPLE_*
          # secrets likewise arrive via $GITHUB_ENV, set only when non-empty
          # (empty CSC_LINK breaks the mac/win packager).

      - name: Upload installers as run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: termipod-electron-${{ matrix.label }}
          if-no-files-found: warn
          path: |
            desktop/electron/release/*.AppImage
            desktop/electron/release/*.deb
            desktop/electron/release/*.dmg
            desktop/electron/release/*.zip
            desktop/electron/release/*.exe
            desktop/electron/release/*.blockmap
            desktop/electron/release/latest*.yml

  # On an electron-v* tag: gather the three OS bundles into a PRERELEASE GitHub
  # release on the pushed tag. Prerelease + existing tag are both load-bearing —
  # see the header comment. The maintainer verifies these installers, then runs
  # the `promote` dispatch to go live.
  release:
    name: Create prerelease on the tag
    needs: bundle
    if: startsWith(github.ref, 'refs/tags/electron-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: termipod-electron-*
          path: assets
          merge-multiple: true
      - name: Create/refresh the prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG='${{ github.ref_name }}'
          V=$(node -p "require('./desktop/package.json').version")
          case "$TAG" in
            *-alpha) CH='alpha'; NOTE='**Alpha — UNSIGNED, device-test only.** Not for distribution: macOS Gatekeeper will quarantine it (right-click→Open, or `xattr -dr com.apple.quarantine <app>`). Signed builds ship on `-beta` tags.' ;;
            *-beta)  CH='beta';  NOTE='**Beta — signed + notarized.**' ;;
            *)       CH='beta';  NOTE='**Beta — signed + notarized.**' ;;
          esac
          gh release create "$TAG" --prerelease --verify-tag \
            --title "TermiPod Desktop (Electron) $V — $CH" \
            --notes "Electron desktop build $V ($CH). $NOTE Not the update feed — promote to \`electron-latest\` to go live (see desktop/electron/README.md)." \
            || echo "release $TAG exists — refreshing assets"
          echo "downloaded assets:"; ls -R assets
          # Upload only the installer files by extension — NOT `assets/*`, which
          # also globs any stray directory a merged artifact leaves behind
          # (`gh release upload` fails reading a directory, and because it aborts
          # mid-list the alphabetically-later latest*.yml manifests never upload).
          shopt -s nullglob
          files=(assets/*.dmg assets/*.zip assets/*.AppImage assets/*.deb assets/*.exe assets/*.blockmap assets/*.yml)
          echo "uploading ${#files[@]} assets: ${files[*]}"
          gh release upload "$TAG" "${files[@]}" --clobber

  # Manual go-live: copy a verified release's assets onto the rolling
  # `electron-latest` feed release that packaged apps poll (the `generic`
  # publish URL in electron-builder.yml). Old assets are removed first so the
  # feed only ever holds one version.
  promote:
    name: Promote ${{ inputs.promote }} to the update feed
    if: inputs.promote != ''
    runs-on: ubuntu-latest
    steps:
      - name: Promote to electron-latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          P='${{ inputs.promote }}'
          gh release download "electron-v$P" --dir assets
          ls -l assets
          gh release create electron-latest --prerelease \
            --title 'Electron update feed (rolling)' \
            --notes 'Rolling electron-updater feed — assets are replaced by the promote job. Do not delete; packaged apps poll releases/download/electron-latest/.' \
            || true
          for a in $(gh release view electron-latest --json assets -q '.assets[].name'); do
            gh release delete-asset electron-latest "$a" -y
          done
          gh release upload electron-latest assets/* --clobber
          echo "electron-latest now serves $P"
