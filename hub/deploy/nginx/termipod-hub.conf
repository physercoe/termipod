# Termipod Hub — nginx reverse proxy
#
# Terminates TLS and proxies to a local hub-server on 127.0.0.1:8443.
# SSE endpoints (/v1/teams/*/stream, /v1/teams/*/projects/*/channels/*/stream)
# need request buffering disabled and a long read timeout, otherwise the
# mobile Feed / Attention tabs drop the connection every ~60s.
#
# Usage:
#   1. Copy this file to /etc/nginx/sites-available/termipod-hub.conf
#      and symlink into sites-enabled/.
#   2. Replace hub.example.com with your hostname.
#   3. Run `certbot --nginx -d hub.example.com` to obtain a certificate,
#      or point ssl_certificate at an existing cert.
#   4. `nginx -t && systemctl reload nginx`.

# Dedicated map for upgrade headers (safe to include even if unused).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name hub.example.com;

    # certbot writes /.well-known/acme-challenge/ during renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hub.example.com;

    ssl_certificate     /etc/letsencrypt/live/hub.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hub.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Large request bodies are rare (avatars, excerpts); 10 MB is plenty.
    client_max_body_size 10m;

    # ---- SSE: streaming endpoints ----
    # Must match before the generic /v1/ block so buffering stays off.
    location ~ ^/v1/teams/[^/]+/stream$ {
        proxy_pass              http://127.0.0.1:8443;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection        "";
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        chunked_transfer_encoding off;
    }
    location ~ ^/v1/teams/[^/]+/projects/[^/]+/channels/[^/]+/stream$ {
        proxy_pass              http://127.0.0.1:8443;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection        "";
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      3600s;
        proxy_send_timeout      3600s;
        chunked_transfer_encoding off;
    }

    # ---- Everything else (regular REST) ----
    location / {
        proxy_pass              http://127.0.0.1:8443;
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Upgrade           $http_upgrade;
        proxy_set_header        Connection        $connection_upgrade;
        proxy_read_timeout      120s;
    }
}
