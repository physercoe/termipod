<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TermiPod">
  <defs>
    <!-- Main accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e0d0"/>
      <stop offset="100%" stop-color="#0090ff"/>
    </linearGradient>

    <!-- Subtle background radial glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0090ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0090ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft halo behind the star -->
    <radialGradient id="starHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e0d0" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#00e0d0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00e0d0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0D0E18"/>

  <!-- Subtle center glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Outer ring — thin geometric border -->
  <rect x="72" y="72" width="368" height="368" rx="84" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- > symbol — clean geometric chevron -->
  <path
    d="M152 192 L232 264 L152 336"
    fill="none"
    stroke="url(#accent)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- _ underscore — clean horizontal line -->
  <line
    x1="260" y1="336"
    x2="360" y2="336"
    stroke="url(#accent)"
    stroke-width="28"
    stroke-linecap="round"
  />

  <!-- Twinkling star — replaces the blinking cursor block -->
  <g transform="translate(354 206)">
    <!-- Soft halo that pulses with the star -->
    <circle r="48" fill="url(#starHalo)">
      <animate attributeName="opacity" values="0.9;0.25;0.9" dur="2.2s" repeatCount="indefinite"/>
    </circle>

    <!-- 4-point sparkle (Gemini-style), drawn around (0,0) so the
         scale animation breathes from its center. Quadratic curves
         with control points near the center pull each side inward,
         giving sharp points with concave waists. -->
    <path
      d="M 0,-34 Q 4.5,-4.5 34,0 Q 4.5,4.5 0,34 Q -4.5,4.5 -34,0 Q -4.5,-4.5 0,-34 Z"
      fill="url(#accent)"
    >
      <animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/>
      <animateTransform
        attributeName="transform"
        type="scale"
        values="1;1.12;1"
        dur="2.2s"
        repeatCount="indefinite"
      />
    </path>
  </g>
</svg>
