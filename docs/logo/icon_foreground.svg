<!--
  Foreground-only variant of logo.svg for the Android adaptive-icon
  foreground layer. No background tile, no animations — the launcher
  draws a system background behind this asset and may mask it with a
  circle, squircle, etc. The glyph sits within the inner safe zone
  (~72dp of the 108dp viewport, i.e., the inner 66%).
-->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TermiPod">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14e2c6"/>
      <stop offset="48%" stop-color="#0cbdf4"/>
      <stop offset="100%" stop-color="#1f8fff"/>
    </linearGradient>
    <linearGradient id="spark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8ef2ff"/>
      <stop offset="100%" stop-color="#45c2f7"/>
    </linearGradient>
    <radialGradient id="starHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#40cdfa" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#40cdfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#40cdfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <path d="M162 182 L232 252 L162 322" fill="none" stroke="url(#accent)" stroke-width="31" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(326.5 252)">
    <circle r="44" fill="url(#starHalo)"/>
    <path d="M 0,-29 Q 4.35,-4.35 29,0 Q 4.35,4.35 0,29 Q -4.35,4.35 -29,0 Q -4.35,-4.35 0,-29 Z" fill="url(#spark)"/>
  </g>
</svg>
