# Built-in ML worker template. Copied to team/templates/agents/ on first init.
# User edits win — subsequent init calls never overwrite.
#
# The worker runs on a GPU host and executes one training run per A2A task.
# Expected to receive `train(config)` tasks from a steward and log metrics
# to trackio. See hub/templates/prompts/ml-worker.v1.md for the runbook.
template: agents.ml-worker
version: 1
extends: null

# ADR-025 W6 — workers default to M2 (structured stdio) so the
# steward overlay can render transcripts; M4 fallback for hosts
# without the MCP gateway port. ml-worker keeps its explicit
# `default_workdir: ~/hub-work` since it's the team-shared scratch
# space, not project-scoped.
driving_mode: M2
fallback_modes: [M4]

backend:
  kind: claude-code
  # {{model}} expands from this field. {{permission_flag}} resolves from
  # the claude-code family's permission_modes (ADR-043 P3) keyed by the
  # spawn request's permission_mode (skip / prompt) — no per-template map.
  model: sonnet-4-6
  default_workdir: ~/hub-work
  # M2 (structured stdio) speaks the agent-native JSON-line protocol. The
  # mode-selecting flags (--print --output-format stream-json
  # --input-format stream-json --verbose) live on the claude-code family's
  # launch.M2.mode_args (ADR-043) and the launcher appends them — a
  # persona can no longer omit them and ship a cmd that runs interactive.
  # This template carries only the bin + intent ({{model}}, permissions).
  cmd: "claude --model {{model}} {{permission_flag}}"

default_role: worker.ml
display_label: "ML Worker"

default_capabilities:
  - blob.read
  - blob.write
  - delegate
  - decision.vote: minor
  - spawn.descendants: 0
  - tasks_create
  - tasks_update         # ADR-029: status='blocked' when a run can't proceed
  - tasks_complete       # ADR-029 W2.8 close-out verb
  - runs_create
  - runs.attach_metric_uri
  # No project/template/policy writes — workers execute, not govern.

prompt: ml-worker.v1.md

skills:
  - id: train
    name: train
    description: "Run a training config and log metrics to trackio"
    tags: [ml, training]

default_channels:
  hub-meta: read
