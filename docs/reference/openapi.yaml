            schema: { $ref: "#/components/schemas/RunCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
    get:
      tags: [Runs]
      operationId: listRuns
      summary: List runs
      responses:
        "200":
          description: Runs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Run" }

  /v1/teams/{team}/runs/{run}:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Run"
    get:
      tags: [Runs]
      operationId: getRun
      summary: Get run
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }

  /v1/teams/{team}/runs/{run}/complete:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Run"
    post:
      tags: [Runs]
      operationId: completeRun
      summary: Mark run completed / failed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [completed, failed, cancelled] }
                final_metrics_json: { type: object }
      responses:
        "200": { description: Updated }

  /v1/teams/{team}/runs/{run}/metric_uri:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Run"
    post:
      tags: [Runs]
      operationId: attachMetricURI
      summary: Attach trackio / wandb / tfevents URI to a run
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [trackio_run_uri]
              properties:
                trackio_run_uri: { type: string }
                trackio_host_id: { type: string }
      responses:
        "200": { description: Updated }

  /v1/teams/{team}/runs/{run}/metrics:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Run"
    put:
      tags: [Runs]
      operationId: putRunMetrics
      summary: Push downsampled metric series
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunMetricsBatch" }
      responses:
        "200": { description: Stored }
    get:
      tags: [Runs]
      operationId: getRunMetrics
      summary: List run metric series
      responses:
        "200":
          description: Metrics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunMetricsBatch" }

  /v1/teams/{team}/runs/{run}/images:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Run"
    post:
      tags: [Runs]
      operationId: postRunImages
      summary: Add image-series checkpoint
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunImagesBatch" }
      responses:
        "200": { description: Stored }
    get:
      tags: [Runs]
      operationId: getRunImages
      summary: List image-series checkpoints
      responses:
        "200":
          description: Images
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunImagesBatch" }

  /v1/teams/{team}/runs/{run}/histograms:
    parameters:
      - $ref: "#/components/parameters/Team"
      - $ref: "#/components/parameters/Run"
    put:
      tags: [Runs]
      operationId: putRunHistograms
      summary: Replace histogram-series
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RunHistogramsBatch" }
      responses:
        "200": { description: Stored }
    get:
      tags: [Runs]
      operationId: getRunHistograms
      summary: List histogram-series
      responses:
        "200":
          description: Histograms
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunHistogramsBatch" }

  # ======================================================================
  # Attention
  # ======================================================================

  /v1/teams/{team}/attention:
    parameters:
      - $ref: "#/components/parameters/Team"
    post:
      tags: [Attention]
      operationId: createAttention
      summary: Create attention item
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AttentionCreateRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttentionItem" }
    get:
      tags: [Attention]
      operationId: listAttention
      summary: List attention items
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [open, resolved] }
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Attention page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttentionPage" }

  /v1/teams/{team}/attention/{id}/context:
    parameters:
      - $ref: "#/components/parameters/Team"
      - in: path
        name: id
        required: true
        schema: { type: string }
    get:
      tags: [Attention]
      operationId: getAttentionContext
      summary: Surrounding events for triage
      responses:
        "200":
          description: Context
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttentionContext" }

  /v1/teams/{team}/attention/{id}/resolve:
    parameters:
      - $ref: "#/components/parameters/Team"
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Attention]
      operationId: resolveAttention
      summary: Resolve without choice (info / digest items)
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttentionItem" }

  /v1/teams/{team}/attention/{id}/decide:
    parameters:
      - $ref: "#/components/parameters/Team"
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Attention]
      operationId: decideAttention
      summary: Resolve with explicit choice
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AttentionDecideRequest" }
      responses:
        "200":
          description: Decided
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AttentionItem" }

  # ======================================================================
  # Admin (audit, policy, tokens, principals)
  # ======================================================================

  /v1/teams/{team}/audit:
    parameters:
      - $ref: "#/components/parameters/Team"
    get:
      tags: [Admin]
      operationId: listAudit
      summary: List audit_events (filtered, paginated)
      parameters:
        - in: query
          name: actor_kind
          schema: { type: string }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: target_kind
          schema: { type: string }
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
      responses:
        "200":
          description: Audit events page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditEventsPage" }

  /v1/teams/{team}/policy:
    parameters:
      - $ref: "#/components/parameters/Team"
    get:
      tags: [Admin]
      operationId: getPolicy
      summary: Get team policy
      responses:
        "200":
          description: Policy
          content:
            application/yaml: {}
    put:
      tags: [Admin]
      operationId: putPolicy
      summary: Replace team policy
      requestBody:
        content:
          application/yaml: {}
      responses:
        "200": { description: Saved }

  /v1/teams/{team}/auth-tokens:
    parameters:
      - $ref: "#/components/parameters/Team"
    get:
      tags: [Admin]
      operationId: listTokens
      summary: List tokens (no plaintext; metadata only)
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuthToken" }
    post:
      tags: [Admin]
      operationId: issueToken
      summary: Mint a new token (returns plaintext once)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/IssueTokenRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IssuedToken" }

  /v1/teams/{team}/auth-tokens/{id}/revoke:
    parameters:
      - $ref: "#/components/parameters/Team"
      - in: path
        name: id
        required: true
        schema: { type: string }
    post:
      tags: [Admin]
      operationId: revokeToken
      summary: Revoke token
      responses:
        "204": { description: Revoked }

  /v1/teams/{team}/principals:
    parameters:
      - $ref: "#/components/parameters/Team"
    get:
      tags: [Admin]
      operationId: listPrincipals
      summary: List active principals (humans + agents)
      responses:
        "200":
          description: Principals
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Principal" }

  # ======================================================================
  # MCP gateway
  # ======================================================================

  /mcp/{token}:
    parameters:
      - in: path
        name: token
        required: true
        schema: { type: string }
        description: per-spawn MCP token
    post:
      tags: [MCP]
      operationId: mcpRPC
      summary: JSON-RPC entry for MCP — host-runner relays agent calls here
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: JSON-RPC response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        SHA-256 hashed in `auth_tokens.token_hash`. Plaintext is
        printed only once at issuance. Token kinds: owner / user /
        agent / host. See `permission-model.md`.

  parameters:
    Team:
      in: path
      name: team
      required: true
      schema: { type: string }
      description: Team identifier (default `default` in MVP)
    Host:
      in: path
      name: host
      required: true
      schema: { type: string }
    Agent:
      in: path
      name: agent
      required: true
      schema: { type: string }
    Project:
      in: path
      name: project
      required: true
      schema: { type: string }
    Channel:
      in: path
      name: channel
      required: true
      schema: { type: string }
    Session:
      in: path
      name: session
      required: true
      schema: { type: string }
    Run:
      in: path
      name: run
      required: true
      schema: { type: string }
    PageCursor:
      in: query
      name: cursor
      schema: { type: string }
      description: Opaque server-defined cursor
    PageLimit:
      in: query
      name: limit
      schema: { type: integer, default: 50, maximum: 200, minimum: 1 }
    SearchQuery:
      in: query
      name: q
      required: true
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      schema: { type: string, format: uuid }
      description: |
        Optional client-generated UUID. Two requests with the same
        key + body return the same response without re-executing.
        Hub stores keys for 24 h.

  responses:
    BadRequest:
      description: Malformed request (validation)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }
    Unauthorized:
      description: Missing or invalid token
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }
    Forbidden:
      description: Token valid; role insufficient
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }
    Conflict:
      description: State conflict
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }
    RateLimited:
      description: Rate limited; see Retry-After
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetail" }

  schemas:
    ProblemDetail:
      type: object
      description: RFC 7807 problem-detail
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        audit_event_id: { type: string }
        context:
          type: object
          additionalProperties: true

    ServerInfo:
      type: object
      required: [server_version, supported_api_versions]
      properties:
        server_version: { type: string }
        supported_api_versions:
          type: array
          items: { type: string }
        schema_versions_supported:
          type: array
          items: { type: integer }
        commit: { type: string }
        build_time: { type: string, format: date-time }
        modified: { type: boolean }

    Page:
      type: object
      properties:
        next_cursor: { type: string, nullable: true }
        total_estimate: { type: integer }

    SearchResults:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true
        next_cursor: { type: string, nullable: true }

    Host:
      type: object
      required: [id, team_id, name, status]
      properties:
        id: { type: string }
        team_id: { type: string }
        name: { type: string }
        status:
          type: string
          enum: [online, offline, disconnected]
        last_seen_at: { type: string, format: date-time, nullable: true }
        capabilities_json:
          type: object
          additionalProperties: true
        ssh_hint_json:
          $ref: "#/components/schemas/SSHHint"
        runner_commit: { type: string }
        runner_build_time: { type: string }
        runner_modified: { type: boolean }
        created_at: { type: string, format: date-time }

    HostsPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Host" }

    HostRegisterRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        capabilities_json: { type: object }
        ssh_hint_json: { $ref: "#/components/schemas/SSHHint" }

    HostHeartbeat:
      type: object
      properties:
        runner_commit: { type: string }
        runner_build_time: { type: string }
        runner_modified: { type: boolean }
        capabilities_json: { type: object }

    SSHHint:
      type: object
      description: Non-secret SSH hint — never includes credentials
      properties:
        hostname: { type: string }
        port: { type: integer }
        username: { type: string }
        jump_host: { type: string }

    HostCapabilities:
      type: object
      properties:
        agents:
          type: object
          additionalProperties:
            type: object
            properties:
              installed: { type: boolean }
              version: { type: string }
              supports:
                type: array
                items: { type: string, enum: [M1, M2, M4] }
        probed_at: { type: string, format: date-time }

    HostCommandsPage:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true

    A2ACard:
      type: object
      properties:
        agent_id: { type: string }
        url: { type: string, format: uri }
        capabilities:
          type: array
          items: { type: string }
        manifest:
          type: object
          additionalProperties: true

    TunnelRequest:
      type: object
      additionalProperties: true

    TunnelResponse:
      type: object
      additionalProperties: true

    Agent:
      type: object
      required: [id, team_id, handle, kind, status]
      properties:
        id: { type: string }
        team_id: { type: string }
        handle: { type: string }
        kind:
          type: string
          enum: [claude-code, codex, gemini, custom]
        status:
          type: string
          enum: [pending, running, idle, waiting_attention, paused, terminated, archived]
        host_id: { type: string, nullable: true }
        pane_id: { type: string, nullable: true }
        parent_agent_id: { type: string, nullable: true }
        backend_json: { type: object }
        capabilities_json:
          type: array
          items: { type: string }
        worktree_path: { type: string, nullable: true }
        journal_path: { type: string, nullable: true }
        budget_cents: { type: integer, nullable: true }
        spent_cents: { type: integer }
        idle_since: { type: string, format: date-time, nullable: true }
        pause_state: { type: string, enum: [running, paused] }
        driving_mode: { type: string, enum: [M1, M2, M4], nullable: true }
        created_at: { type: string, format: date-time }
        terminated_at: { type: string, format: date-time, nullable: true }

    AgentsPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Agent" }

    AgentCreateRequest:
      type: object
      required: [handle, kind]
      properties:
        handle: { type: string }
        kind: { type: string }
        backend_json: { type: object }
        capabilities_json:
          type: array
          items: { type: string }
        parent_agent_id: { type: string }

    AgentSpawnRequest:
      type: object
      required: [child_handle, kind, host_id, spawn_spec_yaml]
      properties:
        child_handle: { type: string }
        kind: { type: string }
        host_id: { type: string }
        spawn_spec_yaml: { type: string, format: yaml }
        parent_agent_id: { type: string }
        task_json: { type: object }

    AgentSpawn:
      type: object
      required: [id, child_agent_id, spawn_spec_yaml, spawned_at]
      properties:
        id: { type: string }
        parent_agent_id: { type: string, nullable: true }
        child_agent_id: { type: string }
        spawn_spec_yaml: { type: string }
        spawn_authority_json: { type: object }
        task_json: { type: object }
        spawned_at: { type: string, format: date-time }
        terminated_at: { type: string, format: date-time, nullable: true }
        terminated_reason: { type: string, nullable: true }
        worktree_path: { type: string, nullable: true }
        mcp_token: { type: string }

    AgentPatch:
      type: object
      additionalProperties: true

    AgentEvent:
      type: object
      required: [id, agent_id, kind, ts]
      properties:
        id: { type: string }
        agent_id: { type: string }
        kind: { type: string, description: "AG-UI event kind" }
        ts: { type: string, format: date-time }
        payload_json: { type: object }
        producer:
          type: string
          enum: [engine, host-runner, hub, a2a]

    AgentInput:
      type: object
      required: [kind]
      description: |
        Structured input event posted to an agent. The hub persists each
        request as one row in `agent_events` with producer='user' (or
        'a2a') and kind='input.<kind>'; the host-runner's InputRouter
        forwards to the live driver. The kind selects which shape applies;
        unrelated fields on the request are ignored.

        ADR-021 expansions:
          - W2.1 added `set_mode` + `set_model` for the runtime mode/model
            picker. The hub routes by `family.runtime_mode_switch[mode]`:
            rpc → forward to driver, respawn → mutate spec + DoSpawn,
            per_turn_argv → stash for next argv, unsupported → 422.
          - W4.1 added optional `images: [{mime_type, data}]` alongside
            `body` on text inputs. Validated mime allowlist
            (image/png|jpeg|webp|gif), ≤5 MiB decoded per image, ≤3
            images per turn. Drivers map per-engine (Anthropic /
            OpenAI / ACP / strip+warn for gemini-exec).
      properties:
        kind:
          type: string
          enum:
            - text
            - approval
            - answer
            - attention_reply
            - cancel
            - attach
            - set_mode
            - set_model
        producer:
          type: string
          enum: [user, a2a]
          description: Defaults to "user". A2A peer-to-peer dispatch sets "a2a".
        body: { type: string, description: "text + answer + attention_reply" }
        decision:
          type: string
          description: "approval — approve|allow|deny|cancel, or any string when paired with option_id"
        request_id: { type: string, description: "approval / answer / attention_reply" }
        option_id: { type: string, description: "approval / attention_reply — ACP optionId verbatim" }
        note: { type: string }
        reason: { type: string, description: "cancel" }
        document_id: { type: string, description: "attach" }
        mode_id: { type: string, description: "set_mode — ACP availableModes id" }
        model_id: { type: string, description: "set_model — ACP availableModels id" }
        images:
          type: array
          maxItems: 3
          description: "ADR-021 W4.1 — image content blocks alongside body on text inputs"
          items:
            type: object
            required: [mime_type, data]
            properties:
              mime_type:
                type: string
                enum: [image/png, image/jpeg, image/webp, image/gif]
              data:
                type: string
                format: byte
                description: "base64-encoded; ≤5 MiB decoded"

    AgentFamily:
      type: object
      required: [family]
      description: |
        One entry from the merged agent_families.yaml registry. The hub
        embeds defaults; per-family override files under
        `<DataRoot>/agent_families/<family>.yaml` replace embedded
        entries by name.
      properties:
        family: { type: string, description: "wire-level name (claude-code, codex, gemini-cli)" }
        bin: { type: string }
        version_flag: { type: string }
        supports:
          type: array
          items: { type: string, enum: [M1, M2, M4] }
        incompatibilities:
          type: array
          items:
            type: object
            properties:
              mode: { type: string }
              billing: { type: string }
              reason: { type: string }
        source:
          type: string
          enum: [embedded, override, custom]
        default_auth_method:
          type: string
          description: "ADR-021 D3 / W1.4 — family-level fallback for ACP authenticate methodId"
        runtime_mode_switch:
          type: object
          description: |
            ADR-021 D4 / W2.1 — keyed by driving_mode (M1/M2/M4); values
            are the routing token (rpc | respawn | per_turn_argv |
            unsupported) the hub consults at /agents/{id}/input time.
          additionalProperties:
            type: string
            enum: [rpc, respawn, per_turn_argv, unsupported]
        prompt_image:
          type: object
          description: |
            ADR-021 D5 / W4.6 — keyed by driving_mode; true when the
            engine accepts inline image content blocks. Mobile composer
            reads `prompt_image[active_mode]` to gate the inline-image
            attach affordance.
          additionalProperties: { type: boolean }

    Session:
      type: object
      required: [id, agent_id, status, created_at]
      properties:
        id: { type: string }
        agent_id: { type: string }
        title: { type: string }
        status:
          type: string
          enum: [open, active, closed, archived]
        engine_session_id: { type: string, nullable: true }
        correlation_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time, nullable: true }

    SessionsPage:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/Session" }

    SessionOpenRequest:
      type: object
      properties:
        title: { type: string }
        scope: { type: string }
        system_prompt_args: { type: object }

    SessionDistillRequest:
      type: object
      properties:
        distill_kind:
          type: string
          enum: [decision, brief, plan, template, none]
        artifact_title: { type: string }

    Project:
      type: object
      required: [id, team_id, name, kind, status]
      properties:
