<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="TermiPod — Monogram">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e0d0"/>
      <stop offset="100%" stop-color="#0090ff"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#0D0E18"/>

  <!-- Sparkle above the T — the "spark" of AI, doubling as the dot over an i -->
  <g transform="translate(256 112)">
    <path
      d="M 0,-30 Q 4,-4 30,0 Q 4,4 0,30 Q -4,4 -30,0 Q -4,-4 0,-30 Z"
      fill="url(#accent)"/>
  </g>

  <!-- T crossbar -->
  <rect x="120" y="178" width="272" height="40" rx="20" fill="url(#accent)"/>

  <!-- T stem -->
  <rect x="236" y="218" width="40" height="224" rx="20" fill="url(#accent)"/>
</svg>
