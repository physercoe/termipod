<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e0d0"/>
      <stop offset="100%" stop-color="#0090ff"/>
    </linearGradient>

    <!-- Subtle background radial glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0090ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0090ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Cursor blink gradient -->
    <linearGradient id="cursor-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e0d0"/>
      <stop offset="100%" stop-color="#0090ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0D0E18"/>

  <!-- Subtle center glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Outer ring — thin geometric border -->
  <rect x="72" y="72" width="368" height="368" rx="84" fill="none" stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- > symbol — clean geometric chevron -->
  <path
    d="M152 192 L232 264 L152 336"
    fill="none"
    stroke="url(#accent)"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- _ underscore — clean horizontal line -->
  <line
    x1="260" y1="336"
    x2="360" y2="336"
    stroke="url(#accent)"
    stroke-width="28"
    stroke-linecap="round"
  />

  <!-- Cursor block — blinking rectangle -->
  <rect x="344" y="186" width="20" height="40" rx="4" fill="url(#cursor-grad)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.8s" repeatCount="indefinite"/>
  </rect>
</svg>
