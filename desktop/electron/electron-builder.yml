# electron-builder config (ADR-055 M3.1) — packages the Electron shell into
# installers for the three desktop OSes. There is no local Electron/native
# toolchain here, so CI (.github/workflows/desktop-electron-release.yml) is the
# packaging gate.
#
# Inputs assembled by the workflow before this runs:
#   - out/*.cjs         the esbuild'd main + preload (npm run build)
#   - ../dist           the Vite frontend (npm run build in desktop/)
#   - ../vault-wasm/pkg the wasm-pack crypto (vault-wasm CI job / wasm artifact)
# Native addons (node-pty, @napi-rs/keyring) are asarUnpacked so their .node
# loads. node-pty is ABI-rebuilt for Electron by an EXPLICIT workflow step, not
# electron-builder's own rebuild (npmRebuild:false below) — the built-in
# @electron/rebuild pass hung ~29min in "preparing" on whichever native module
# it reached first (cpu-features, then node-pty), swallowing node-gyp's output.
# The isolated step rebuilds only node-pty (verbose, time-boxed) so a stall is
# visible and bounded; @napi-rs/keyring is N-API (ABI-stable prebuilt, no rebuild).

appId: app.termipod.desktop # matches the Tauri identifier — keychain service + migration source
productName: TermiPod
copyright: © TermiPod contributors

# Do NOT let electron-builder run its own @electron/rebuild — it hangs opaquely
# in "preparing" (see the note above). The workflow rebuilds node-pty explicitly
# before this step; here we only pack the already-correct .node.
npmRebuild: false

directories:
  output: release
  buildResources: build

# Default `**/*` (so production node_modules ship — the esbuild externals
# node-pty/ssh2/ws/sshpk/jszip/@napi-rs/keyring/extract-zip require() from there
# at runtime), minus the source/tooling the packaged app never loads.
files:
  - '**/*'
  - '!src/**/*'
  - '!*.md'
  - '!tsconfig.json'
  - '!esbuild.mjs'
  - '!electron-builder.yml'

# Native .node addons can't be loaded from inside the asar — unpack them.
# @napi-rs/keyring is N-API (ABI-stable, prebuilt); node-pty is rebuilt for the
# Electron ABI by npmRebuild before this packs.
asarUnpack:
  - node_modules/node-pty/**
  - node_modules/@napi-rs/keyring/**

# The frontend and the vault WASM live OUTSIDE the asar on disk: the app://
# handler serves dist via net.fetch(file://) (Chromium's file:// stack can't read
# asar paths), and the vault loader import()s the wasm-pack CJS module by path.
extraResources:
  - from: ../dist
    to: dist
  - from: ../vault-wasm/pkg
    to: vault-wasm/pkg

# electron-updater feed (M3.2/M3.4). NOT the GitHub provider: that resolves the
# update via GitHub's `releases/latest`, which in this shared repo belongs to
# the mobile lane (its in-app checker reads it; mobile `v*` releases own it).
# Instead the client polls a fixed `generic` URL — a rolling prerelease named
# `electron-latest` whose assets (latest*.yml + installers) the release
# workflow's `promote` job points at a verified version. This block is baked
# into the packaged app-update.yml, so it must match that workflow.
publish:
  provider: generic
  url: https://github.com/physercoe/termipod/releases/download/electron-latest

mac:
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  # Deterministic, space-free names so the updater feed URLs are predictable
  # (M3.4). Single-arch per OS; macOS is arm64-only BY DECISION (2026-07-21):
  # the Intel-Mac population is zero, so plan §5's universal dmg was dropped
  # (universal would also need both arches of @napi-rs/keyring's per-arch
  # optionalDependencies force-installed). Revisit only if an Intel user shows
  # up (a fixed name would collide across arches).
  artifactName: Desktop-${version}-mac.${ext}
  target:
    - dmg
    - zip # electron-updater's mac feed needs the zip alongside the dmg
  # Signing + notarization are supplied by CI env (CSC_LINK / CSC_KEY_PASSWORD /
  # APPLE_* ) when the secrets are present; unsigned builds still produce a dmg.
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  icon: assets/icon.ico
  artifactName: Desktop-Setup-${version}.${ext}
  target:
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: assets/icon.png
  category: Development
  maintainer: TermiPod contributors <noreply@users.noreply.github.com>
  artifactName: Desktop-${version}.${ext}
  target:
    - AppImage
    - deb
